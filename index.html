<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Loading...</title>
  <meta name="description" content="Professional Portfolio & Resume" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    /* ─── CSS CUSTOM PROPERTIES ─────────────────────────────────────── */
    :root {
      --font-main: 'Plus Jakarta Sans', sans-serif;
      --accent:    #6366f1;
      --accent-2:  #8b5cf6;
      --accent-grd: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      --card-radius: 1rem;
      --transition: 0.25s cubic-bezier(.4,0,.2,1);
    }

    /* Light theme */
    html.light {
      --bg-page:    #f8fafc;
      --bg-surface: #ffffff;
      --bg-alt:     #f1f5f9;
      --bg-card:    #ffffff;
      --text-primary:   #0f172a;
      --text-secondary: #475569;
      --text-muted:     #94a3b8;
      --border:     #e2e8f0;
      --shadow:     0 4px 24px rgba(15,23,42,.08);
      --shadow-lg:  0 12px 40px rgba(15,23,42,.14);
      --sidebar-bg: #1e293b;
      --sidebar-text: #f1f5f9;
    }

    /* Dark theme */
    html.dark, html:not(.light) {
      --bg-page:    #0f172a;
      --bg-surface: #1e293b;
      --bg-alt:     #162032;
      --bg-card:    #1e293b;
      --text-primary:   #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted:     #64748b;
      --border:     #334155;
      --shadow:     0 4px 24px rgba(0,0,0,.35);
      --shadow-lg:  0 12px 40px rgba(0,0,0,.5);
      --sidebar-bg: #0f172a;
      --sidebar-text: #f1f5f9;
    }

    /* ─── BASE ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-family: var(--font-main); }
    body {
      background: var(--bg-page);
      color: var(--text-primary);
      transition: background var(--transition), color var(--transition);
      min-height: 100vh;
    }

    /* ─── SCROLLBAR ─────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-alt); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

    /* ─── NAVBAR ────────────────────────────────────────────────────── */
    #navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background var(--transition), border-color var(--transition);
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto;
      padding: .875rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem;
    }
    .nav-logo {
      font-size: 1.25rem; font-weight: 800;
      background: var(--accent-grd);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: -.5px;
      white-space: nowrap;
    }
    .nav-links { display: flex; gap: 1.5rem; align-items: center; }
    .nav-links a {
      font-size: .875rem; font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color var(--transition);
    }
    .nav-links a:hover { color: var(--accent); }
    .nav-actions { display: flex; align-items: center; gap: .625rem; }

    .btn-icon {
      width: 38px; height: 38px; border-radius: .5rem;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-alt); border: 1px solid var(--border);
      color: var(--text-secondary); cursor: pointer;
      transition: all var(--transition);
      font-size: .875rem;
    }
    .btn-icon:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    .btn-primary {
      display: inline-flex; align-items: center; gap: .5rem;
      background: var(--accent-grd); color: #fff;
      padding: .5rem 1.1rem; border-radius: .5rem;
      font-size: .8125rem; font-weight: 600;
      border: none; cursor: pointer;
      transition: opacity var(--transition), transform var(--transition);
      white-space: nowrap;
    }
    .btn-primary:hover { opacity: .88; transform: translateY(-1px); }

    /* ─── HERO ──────────────────────────────────────────────────────── */
    #hero {
      min-height: 100vh;
      display: flex; align-items: center;
      padding: 6rem 1.5rem 4rem;
      background: var(--bg-page);
      position: relative; overflow: hidden;
    }
    #hero::before {
      content: '';
      position: absolute; top: -30%; right: -10%; width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(99,102,241,.15) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }
    #hero::after {
      content: '';
      position: absolute; bottom: -20%; left: -10%; width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(139,92,246,.1) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }
    .hero-inner {
      max-width: 1200px; margin: 0 auto; width: 100%;
      display: grid; grid-template-columns: 1fr 1fr; gap: 4rem;
      align-items: center; position: relative; z-index: 1;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: .5rem;
      background: rgba(99,102,241,.12); border: 1px solid rgba(99,102,241,.25);
      color: var(--accent); border-radius: 99px;
      padding: .375rem .875rem; font-size: .75rem; font-weight: 600;
      letter-spacing: .05em; text-transform: uppercase; margin-bottom: 1.25rem;
    }
    .hero-title {
      font-size: clamp(2.2rem, 5vw, 3.5rem); font-weight: 800;
      line-height: 1.1; letter-spacing: -.03em;
      color: var(--text-primary); margin-bottom: 1.25rem;
    }
    .hero-title span {
      background: var(--accent-grd);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-bio {
      font-size: 1rem; line-height: 1.8; color: var(--text-secondary);
      margin-bottom: 2rem;
    }
    .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
    .btn-outline {
      display: inline-flex; align-items: center; gap: .5rem;
      border: 2px solid var(--accent); color: var(--accent);
      padding: .625rem 1.25rem; border-radius: .5rem;
      font-size: .875rem; font-weight: 600;
      text-decoration: none; cursor: pointer;
      transition: all var(--transition); background: transparent;
    }
    .btn-outline:hover { background: var(--accent); color: #fff; }

    .hero-visual {
      display: flex; justify-content: center; align-items: center;
    }
    .hero-avatar-wrap {
      position: relative; width: 320px; height: 320px;
    }
    .hero-avatar-ring {
      position: absolute; inset: -8px; border-radius: 50%;
      background: var(--accent-grd); opacity: .2;
      animation: pulse-ring 3s ease-in-out infinite;
    }
    @keyframes pulse-ring {
      0%, 100% { transform: scale(1); opacity: .2; }
      50% { transform: scale(1.05); opacity: .35; }
    }
    .hero-avatar {
      width: 100%; height: 100%; border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--border);
      background: var(--bg-alt);
    }
    .hero-avatar-placeholder {
      width: 100%; height: 100%; border-radius: 50%;
      background: linear-gradient(135deg, var(--bg-alt), var(--bg-surface));
      border: 4px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem; color: var(--text-muted);
    }

    /* ─── SECTION SHELL ─────────────────────────────────────────────── */
    .section-wrap {
      padding: 5rem 1.5rem;
      transition: background var(--transition);
    }
    .section-inner { max-width: 1200px; margin: 0 auto; }
    .section-label {
      display: inline-flex; align-items: center; gap: .5rem;
      color: var(--accent); font-size: .75rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; margin-bottom: .75rem;
    }
    .section-title {
      font-size: clamp(1.75rem, 4vw, 2.5rem); font-weight: 800;
      letter-spacing: -.03em; color: var(--text-primary); margin-bottom: .75rem;
    }
    .section-subtitle {
      font-size: 1rem; color: var(--text-secondary); line-height: 1.7;
      max-width: 600px;
    }
    .section-divider { margin-bottom: 3rem; }

    /* ─── EXPERIENCE TIMELINE ───────────────────────────────────────── */
    .timeline { position: relative; padding-left: 2rem; }
    .timeline::before {
      content: ''; position: absolute; left: .6875rem; top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, var(--accent), var(--accent-2), transparent);
    }
    .timeline-item {
      position: relative; padding: 0 0 2.5rem 2rem;
    }
    .timeline-node {
      position: absolute; left: -2rem; top: .25rem;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent-grd);
      display: flex; align-items: center; justify-content: center;
      font-size: .55rem; color: #fff;
      box-shadow: 0 0 0 4px var(--bg-page);
    }
    .timeline-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      transition: box-shadow var(--transition), transform var(--transition);
    }
    .timeline-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
    .timeline-meta { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; margin-bottom: .5rem; }
    .timeline-date {
      font-size: .75rem; font-weight: 600; color: var(--accent);
      background: rgba(99,102,241,.1); border-radius: 99px;
      padding: .2rem .65rem;
    }
    .timeline-org { font-size: .8125rem; color: var(--text-muted); font-weight: 500; }
    .timeline-role {
      font-size: 1.0625rem; font-weight: 700; color: var(--text-primary);
      margin-bottom: .5rem;
    }
    .timeline-desc { font-size: .875rem; color: var(--text-secondary); line-height: 1.7; }

    /* ─── PORTFOLIO CAROUSEL ────────────────────────────────────────── */
    .carousel-wrap { position: relative; overflow: hidden; }
    .carousel-track-outer { overflow: hidden; border-radius: var(--card-radius); }
    .carousel-track {
      display: flex; gap: 1.5rem;
      transition: transform .4s cubic-bezier(.4,0,.2,1);
      will-change: transform;
    }
    .portfolio-card {
      flex: 0 0 calc(33.333% - 1rem);
      min-width: 280px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: box-shadow var(--transition), transform var(--transition);
    }
    .portfolio-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px); }
    .portfolio-card-thumb {
      width: 100%; height: 180px;
      background: var(--bg-alt);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; color: var(--text-muted);
      overflow: hidden; position: relative;
    }
    .portfolio-card-thumb img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .portfolio-type-badge {
      position: absolute; top: .75rem; right: .75rem;
      font-size: .6875rem; font-weight: 700; letter-spacing: .05em;
      padding: .2rem .5rem; border-radius: .3rem;
      background: rgba(99,102,241,.85); color: #fff;
    }
    .portfolio-card-body { padding: 1.25rem; }
    .portfolio-card-title { font-size: 1rem; font-weight: 700; color: var(--text-primary); margin-bottom: .375rem; }
    .portfolio-card-desc { font-size: .8125rem; color: var(--text-secondary); line-height: 1.6; }

    .carousel-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--bg-surface); border: 1px solid var(--border);
      color: var(--text-primary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; z-index: 10;
      box-shadow: var(--shadow-lg);
      transition: all var(--transition);
    }
    .carousel-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .carousel-btn.prev { left: -22px; }
    .carousel-btn.next { right: -22px; }

    /* ─── CAROUSEL DOTS ─────────────────────────────────────────────── */
    .carousel-dots { display: flex; justify-content: center; gap: .5rem; margin-top: 1.5rem; }
    .carousel-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border); cursor: pointer;
      transition: all var(--transition);
    }
    .carousel-dot.active { background: var(--accent); width: 20px; border-radius: 4px; }

    /* ─── APP MATRIX (SKILLS) ───────────────────────────────────────── */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
    }
    .skill-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 1.25rem 1rem;
      display: flex; flex-direction: column; align-items: center;
      gap: .6rem; text-align: center;
      box-shadow: var(--shadow);
      transition: box-shadow var(--transition), transform var(--transition);
      cursor: default;
    }
    .skill-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
    .skill-icon-box {
      width: 44px; height: 44px; border-radius: .5rem;
      background: rgba(99,102,241,.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; color: var(--accent);
    }
    .skill-name { font-size: .8125rem; font-weight: 600; color: var(--text-primary); }
    .skill-cat {
      font-size: .6875rem; font-weight: 500; color: var(--text-muted);
      background: var(--bg-alt); border-radius: 99px; padding: .15rem .5rem;
    }

    /* ─── CATEGORY TABS ─────────────────────────────────────────────── */
    .cat-tabs { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .cat-tab {
      padding: .375rem .875rem; border-radius: 99px;
      font-size: .8125rem; font-weight: 500;
      border: 1px solid var(--border);
      background: var(--bg-alt); color: var(--text-secondary);
      cursor: pointer; transition: all var(--transition);
    }
    .cat-tab.active, .cat-tab:hover {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }

    /* ─── CONTACT ───────────────────────────────────────────────────── */
    .contact-grid {
      display: grid; grid-template-columns: 1fr 1.5fr;
      gap: 3rem; align-items: start;
    }
    .contact-info-item {
      display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1.5rem;
    }
    .contact-icon-box {
      width: 44px; height: 44px; border-radius: .5rem; flex-shrink: 0;
      background: rgba(99,102,241,.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: var(--accent);
    }
    .contact-info-label { font-size: .75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
    .contact-info-val { font-size: .9375rem; color: var(--text-primary); font-weight: 500; }
    .contact-form { display: flex; flex-direction: column; gap: 1rem; }
    .form-field { display: flex; flex-direction: column; gap: .375rem; }
    .form-label { font-size: .8125rem; font-weight: 600; color: var(--text-secondary); }
    .form-input, .form-textarea {
      background: var(--bg-alt); border: 1px solid var(--border);
      color: var(--text-primary); border-radius: .5rem;
      padding: .75rem 1rem; font-family: var(--font-main);
      font-size: .9375rem; outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .form-input:focus, .form-textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,.15);
    }
    .form-textarea { resize: vertical; min-height: 130px; }
    .form-status {
      font-size: .875rem; font-weight: 500; padding: .75rem 1rem;
      border-radius: .5rem; display: none;
    }
    .form-status.success { background: rgba(34,197,94,.12); color: #16a34a; border: 1px solid rgba(34,197,94,.25); }
    .form-status.error { background: rgba(239,68,68,.12); color: #dc2626; border: 1px solid rgba(239,68,68,.25); }

    /* ─── FOOTER ────────────────────────────────────────────────────── */
    #footer {
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      padding: 2.5rem 1.5rem;
    }
    .footer-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
    }
    .footer-left { font-size: .8125rem; color: var(--text-muted); line-height: 1.6; }
    .footer-meta { font-size: .6875rem; color: var(--text-muted); margin-top: .25rem; }
    .footer-socials { display: flex; gap: .625rem; }
    .social-btn {
      width: 36px; height: 36px; border-radius: .4rem;
      background: var(--bg-alt); border: 1px solid var(--border);
      color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
      font-size: .875rem; text-decoration: none;
      transition: all var(--transition);
    }
    .social-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ─── MODAL ─────────────────────────────────────────────────────── */
    #modal-overlay {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,.7); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .25s ease;
      padding: 1.5rem;
    }
    #modal-overlay.open { opacity: 1; pointer-events: all; }
    #modal-box {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 1.25rem; padding: 2rem;
      max-width: 800px; width: 100%; max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 32px 80px rgba(0,0,0,.4);
      transform: scale(.96);
      transition: transform .25s ease;
    }
    #modal-overlay.open #modal-box { transform: scale(1); }
    .modal-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 1.5rem; gap: 1rem;
    }
    .modal-title { font-size: 1.25rem; font-weight: 700; color: var(--text-primary); }
    .modal-close {
      width: 34px; height: 34px; border-radius: .4rem; flex-shrink: 0;
      background: var(--bg-alt); border: 1px solid var(--border);
      color: var(--text-secondary); cursor: pointer; font-size: .9rem;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    .modal-close:hover { background: #ef4444; color: #fff; border-color: #ef4444; }
    .modal-body img { width: 100%; border-radius: .5rem; }
    .modal-body iframe {
      width: 100%; height: 500px; border: none; border-radius: .5rem;
      background: var(--bg-alt);
    }

    /* ─── LOADING SKELETON ──────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-alt) 25%, var(--border) 50%, var(--bg-alt) 75%);
      background-size: 400% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: .5rem;
    }
    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    /* ─── LOADING SPINNER ───────────────────────────────────────────── */
    #page-loader {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg-page);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem; transition: opacity .4s ease;
    }
    .loader-ring {
      width: 48px; height: 48px; border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── PRINT WORKSPACE ───────────────────────────────────────────── */
    #print-workspace { display: none; }

    /* ─── PRINT STYLES ──────────────────────────────────────────────── */
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body > *:not(#print-workspace) { display: none !important; }
      #print-workspace {
        display: block !important;
        font-family: 'Plus Jakarta Sans', sans-serif;
        width: 100%; margin: 0; padding: 0;
        background: #fff; color: #0f172a;
      }
      #print-workspace * { box-sizing: border-box; }
      .resume-shell {
        display: flex; width: 100%; min-height: 100vh;
      }
      .resume-sidebar {
        width: 33%; background: #1e293b !important;
        color: #f1f5f9 !important;
        padding: 2rem 1.5rem;
        flex-shrink: 0;
      }
      .resume-main {
        width: 67%; padding: 2rem;
        background: #fff !important; color: #0f172a !important;
      }
    }

    /* ─── RESPONSIVE ────────────────────────────────────────────────── */
    @media (max-width: 1024px) {
      .hero-inner { grid-template-columns: 1fr; text-align: center; }
      .hero-visual { display: none; }
      .contact-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .portfolio-card { flex: 0 0 calc(100% - 0px); min-width: unset; }
      .skills-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    }
    @media (max-width: 480px) {
      .nav-logo { font-size: 1rem; }
    }

    /* ─── SECTION BG VARIANTS ───────────────────────────────────────── */

function getTheme() {

}
function applyTheme(theme) {
  document.documentElement.classList.remove('light', 'dark');
  document.documentElement.classList.add(theme);
  const icon = document.getElementById('theme-icon');
  if (icon) {
    icon.className = theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
  }
  localStorage.setItem('portfolio_theme', theme);
}
function toggleTheme() {
  applyTheme(getTheme() === 'dark' ? 'light' : 'dark');
}
document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function sectionBgClass(bg) {
  const map = {
    'solid-neutral': 'bg-solid-neutral',

    'accent-subtle': 'bg-accent-subtle',
    'accent-medium': 'bg-accent-medium',
    'dark-deep':     'bg-dark-deep'
  };
  return map[bg] || 'bg-solid-neutral';
}
function typeIcon(type) {
  const map = {
    'PPT': 'fa-file-powerpoint', 'PDF': 'fa-file-pdf',
    'Image': 'fa-image', 'URL': 'fa-link', 'Site': 'fa-globe',
    'Video': 'fa-play-circle', 'Doc': 'fa-file-word'
  };
  return map[type] || 'fa-file';
}
function typeIconColor(type) {
  const map = {
    'PPT': '#f97316', 'PDF': '#ef4444',
    'Image': '#8b5cf6', 'URL': '#6366f1', 'Site': '#06b6d4',
    'Video': '#ec4899', 'Doc': '#3b82f6'

}

async function fetchAllData() {
  try {
    const [coreSnap, layoutSnap, expSnap, portSnap, skillsSnap, contactSnap] = await Promise.all([
      db.collection('site_config').doc('core_text').get(),
      db.collection('site_config').doc('layout_configuration').get(),
      db.collection('experience').orderBy('order','asc').get(),
      db.collection('portfolio').orderBy('order','asc').get(),
      db.collection('skills').orderBy('order','asc').get(),
      db.collection('site_config').doc('contact_info').get()
    ]);

    siteData.core       = coreSnap.exists    ? coreSnap.data()    : {};
    siteData.layout     = layoutSnap.exists  ? (layoutSnap.data().sections || []) : [];
    siteData.experience = expSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    siteData.portfolio  = portSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    siteData.skills     = skillsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    siteData.contact    = contactSnap.exists ? contactSnap.data() : {};
  } catch (err) {
    console.error('Firebase fetch error:', err);
    siteData.core    = getFallbackCore();
    siteData.layout  = getFallbackLayout();
    siteData.experience = getFallbackExperience();
    siteData.portfolio  = getFallbackPortfolio();
    siteData.skills     = getFallbackSkills();
    siteData.contact    = getFallbackContact();
  }
}

/* ════════════════════════════════════════════════════════════════
   MAIN RENDER ENGINE
   ════════════════════════════════════════════════════════════════ */
function renderSite() {
  const main = document.getElementById('site-main');
  const c    = siteData.core;

  // Update document title & nav logo
  document.title = c.site_title ? `${c.site_title} — Portfolio` : 'Portfolio';
  const navLogo = document.getElementById('nav-logo');
  if (navLogo) navLogo.textContent = c.nav_logo || 'EA';

  // Build nav links from layout
  const visibleSections = siteData.layout
    .filter(s => s.visible !== false)
    .sort((a, b) => (a.order || 0) - (b.order || 0));

  const navLinksContainer = document.getElementById('nav-links-container');
  if (navLinksContainer) {
    navLinksContainer.innerHTML = visibleSections.map(s => {
      const labels = {
        hero: 'About', experience: 'Experience', portfolio: 'Portfolio',
        skills: 'Skills', contact: 'Contact'
      };
      return `<a href="#${escHtml(s.id)}">${escHtml(labels[s.id] || s.label || s.id)}</a>`;
    }).join('');
  }

  // Render sections in order
  let sectionsHtml = '';
  visibleSections.forEach(s => {
    const bgClass = sectionBgClass(s.bg || 'solid-neutral');
    switch (s.id) {
      case 'hero':       sectionsHtml += renderHero(bgClass);       break;
      case 'experience': sectionsHtml += renderExperience(bgClass); break;
      case 'portfolio':  sectionsHtml += renderPortfolio(bgClass);  break;
      case 'skills':     sectionsHtml += renderSkills(bgClass);     break;
      case 'contact':    sectionsHtml += renderContact(bgClass);    break;
    }
  });
  main.innerHTML = sectionsHtml;

  // Render footer
  renderFooter();

  // Init interactive components
  carouselIndex = 0;
  updateCarousel();
  activeSkillCat = 'All';
}

function renderFooter() {
  const c    = siteData.core;
  const year = new Date().getFullYear();
  const footer = document.getElementById('footer');
  footer.style.display = '';

  const socials = [
    { icon: 'fa-brands fa-github',   url: c.social_github   || '#', label: 'GitHub' },
    { icon: 'fa-brands fa-linkedin', url: c.social_linkedin || '#', label: 'LinkedIn' },
    { icon: 'fa-solid fa-envelope',  url: `mailto:${c.social_email || ''}`, label: 'Email' }
  ];

  footer.innerHTML = `
    <div class="footer-inner">
      <div class="footer-left">
        <div style="font-weight:700;font-size:.9375rem;color:var(--text-primary);margin-bottom:.25rem;">${escHtml(c.site_title || 'Portfolio')}</div>
        <div>${escHtml(c.footer_tagline || 'Crafted with precision and passion.')}</div>
        <div class="footer-meta">
          <i class="fa-solid fa-microchip" style="margin-right:.3rem;"></i>${escHtml(c.footer_tech || 'Firebase · Tailwind CSS · Vanilla JS')}
          &nbsp;·&nbsp; <i class="fa-regular fa-copyright" style="margin-right:.2rem;"></i>${year} All rights reserved.
        </div>
      </div>
      <div class="footer-socials">
        ${socials.filter(s => s.url && s.url !== '#' && s.url !== 'mailto:').map(s =>
          `<a class="social-btn" href="${escHtml(s.url)}" target="_blank" rel="noopener noreferrer" aria-label="${escHtml(s.label)}">
             <i class="${escHtml(s.icon)}"></i>
           </a>`
        ).join('')}
      </div>
    </div>`;
}

/* ════════════════════════════════════════════════════════════════
   CAROUSEL LOGIC
   ════════════════════════════════════════════════════════════════ */
function getCarouselVisible() {
  if (window.innerWidth <= 768) return 1;
  if (window.innerWidth <= 1024) return 2;
  return 3;
}
function updateCarousel() {
  const track = document.getElementById('carousel-track');
  const dots  = document.getElementById('carousel-dots');
  if (!track) return;
  carouselVisible = getCarouselVisible();
  const maxIndex = Math.max(0, carouselTotal - carouselVisible);
  carouselIndex = Math.min(carouselIndex, maxIndex);
  const cardWidth = track.children[0] ? track.children[0].offsetWidth + 24 : 0;
  track.style.transform = `translateX(-${carouselIndex * cardWidth}px)`;
  if (dots) {
    dots.querySelectorAll('.carousel-dot').forEach((d, i) => {
      d.classList.toggle('active', i === carouselIndex);
    });
  }
}
function shiftCarousel(dir) {
  carouselVisible = getCarouselVisible();
  const maxIndex = Math.max(0, carouselTotal - carouselVisible);
  carouselIndex = Math.max(0, Math.min(carouselIndex + dir, maxIndex));
  updateCarousel();
}
function goToSlide(i) {
  carouselIndex = i;
  updateCarousel();
}
window.addEventListener('resize', updateCarousel);

/* ════════════════════════════════════════════════════════════════
   SKILL FILTER
   ════════════════════════════════════════════════════════════════ */
function filterSkills(cat) {
  activeSkillCat = cat;
  const grid = document.getElementById('skills-grid');
  if (!grid) return;
  grid.querySelectorAll('.skill-card').forEach(card => {
    const cardCat = card.getAttribute('data-cat');
    card.style.display = (cat === 'All' || cardCat === cat) ? '' : 'none';
  });
  document.querySelectorAll('.cat-tab').forEach(tab => {
    tab.classList.toggle('active', tab.getAttribute('data-cat') === cat);
  });
}

/* ════════════════════════════════════════════════════════════════
   MODAL SYSTEM
   ════════════════════════════════════════════════════════════════ */
function openModal(index) {
  const item = siteData.portfolio[index];
  if (!item) return;
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-type-label').textContent = item.type || 'Preview';
  document.getElementById('modal-title-text').textContent = item.title || '';
  document.getElementById('modal-desc').textContent = item.description || '';

  const body = document.getElementById('modal-body');
  const actions = document.getElementById('modal-actions');

  body.innerHTML = '';
  actions.innerHTML = '';

  const type = (item.type || '').toUpperCase();

  if (type === 'IMAGE' && item.url) {
    body.innerHTML = `<img src="${escHtml(item.url)}" alt="${escHtml(item.title)}" style="width:100%;border-radius:.5rem;" />`;
  } else if ((type === 'SITE' || type === 'URL') && item.url && item.url !== '#') {
    body.innerHTML = `<iframe src="${escHtml(item.url)}" title="${escHtml(item.title)}" loading="lazy"></iframe>`;
  } else if (type === 'PDF' && item.url && item.url !== '#') {
    body.innerHTML = `<iframe src="${escHtml(item.url)}" title="${escHtml(item.title)}" loading="lazy"></iframe>`;
  } else {
    const color = typeIconColor(item.type);
    body.innerHTML = `
      <div style="background:var(--bg-alt);border-radius:.75rem;padding:3rem;text-align:center;">
        <i class="fa-solid ${typeIcon(item.type)}" style="font-size:4rem;color:${color};margin-bottom:1rem;"></i>
        <p style="color:var(--text-secondary);font-size:.9375rem;">${escHtml(item.type)} preview not available inline.</p>
      </div>`;
  }

  if (item.url && item.url !== '#') {
    actions.innerHTML = `<a href="${escHtml(item.url)}" target="_blank" rel="noopener noreferrer" class="btn-primary" style="text-decoration:none;">
      <i class="fa-solid fa-arrow-up-right-from-square"></i> Open ${escHtml(item.type || 'Link')}
    </a>`;
  }

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ════════════════════════════════════════════════════════════════
   CONTACT FORM SUBMISSION
   ════════════════════════════════════════════════════════════════ */
async function submitContactForm(e) {
  e.preventDefault();
  const btn    = document.getElementById('form-submit');
  const status = document.getElementById('form-status');
  const name   = document.getElementById('cf-name').value.trim();
  const email  = document.getElementById('cf-email').value.trim();
  const message= document.getElementById('cf-msg').value.trim();

  if (!name || !email || !message) {
    showFormStatus('error', 'Please fill in all fields.');
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showFormStatus('error', 'Please enter a valid email address.');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Sending…';

  try {
    await db.collection('messages').add({
      name, email, message,
      timestamp: firebase.firestore.FieldValue.serverTimestamp(),
      read: false
    });
    showFormStatus('success', '✓ Message sent successfully! I\'ll get back to you soon.');
    document.getElementById('contact-form').reset();
  } catch (err) {
    console.error('Contact form error:', err);
    showFormStatus('error', 'Failed to send. Please try again or email directly.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Send Message';
  }
}
function showFormStatus(type, msg) {
  const el = document.getElementById('form-status');
  if (!el) return;
  el.className = `form-status ${type}`;
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 6000);
}
