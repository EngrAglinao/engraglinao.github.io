<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Engr. Aglinao</title>
  <meta name="description" content="Professional portfolio and resume of Engr. Aglinao — Full-Stack Engineer, UI/UX Designer, and Technical Solutions Architect." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    /* =============================================
       GLOBAL CSS VARIABLES & THEME SYSTEM
    ============================================= */
    :root {
      --font-primary: 'Plus Jakarta Sans', sans-serif;
      --accent-primary: #6366f1;
      --accent-secondary: #8b5cf6;
      --accent-tertiary: #06b6d4;
      --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
      --radius-card: 16px;
      --radius-sm: 8px;
      --shadow-card: 0 4px 24px rgba(0,0,0,0.08);
      --shadow-hover: 0 12px 40px rgba(99,102,241,0.2);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* LIGHT THEME */
    html.light {
      --bg-base: #f8f9fc;
      --bg-surface: #ffffff;
      --bg-surface-2: #f1f3f9;
      --bg-surface-3: #e8ebf4;
      --text-primary: #0f1117;
      --text-secondary: #4b5563;
      --text-muted: #9ca3af;
      --border-color: #e5e7eb;
      --nav-bg: rgba(255,255,255,0.85);
      --sidebar-bg: #1e2130;
      --sidebar-text: #f1f5f9;
    }

    /* DARK THEME */
    html.dark {
      --bg-base: #0d0f18;
      --bg-surface: #151929;
      --bg-surface-2: #1a1f35;
      --bg-surface-3: #1f2640;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border-color: #2d3554;
      --nav-bg: rgba(13,15,24,0.88);
      --sidebar-bg: #0a0c14;
      --sidebar-text: #f1f5f9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-family: var(--font-primary); }

    body {
      background-color: var(--bg-base);
      color: var(--text-primary);
      transition: background-color 0.4s ease, color 0.4s ease;
      overflow-x: hidden;
    }

    /* =============================================
       NAVIGATION
    ============================================= */
    #main-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: var(--nav-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border-color);
      transition: var(--transition);
    }

    .nav-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-weight: 800;
      font-size: 1.25rem;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .nav-links {
      display: flex;
      gap: 6px;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 8px;
      transition: var(--transition);
    }

    .nav-links a:hover {
      color: var(--text-primary);
      background: var(--bg-surface-2);
    }

    .nav-actions { display: flex; align-items: center; gap: 10px; }

    .btn-theme-toggle {
      width: 40px; height: 40px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: var(--bg-surface);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      transition: var(--transition);
    }

    .btn-theme-toggle:hover {
      background: var(--bg-surface-2);
      color: var(--accent-primary);
      transform: rotate(15deg);
    }

    .btn-resume {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 18px;
      background: var(--accent-gradient);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      font-family: var(--font-primary);
      white-space: nowrap;
    }

    .btn-resume:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(99,102,241,0.4);
    }

    /* =============================================
       SECTIONS & LAYOUT
    ============================================= */
    section {
      scroll-margin-top: 80px;
    }

    .section-wrapper {
      max-width: 1280px;
      margin: 0 auto;
      padding: 96px 24px;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-surface-2);
      border: 1px solid var(--border-color);
      color: var(--accent-primary);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .section-desc {
      font-size: 1.05rem;
      color: var(--text-secondary);
      max-width: 600px;
      line-height: 1.7;
      margin-bottom: 56px;
    }

    /* =============================================
       HERO SECTION
    ============================================= */
    #hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .hero-bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }

    .hero-bg-orb-1 {
      width: 600px; height: 600px;
      background: var(--accent-primary);
      top: -100px; right: -150px;
    }

    .hero-bg-orb-2 {
      width: 400px; height: 400px;
      background: var(--accent-tertiary);
      bottom: -80px; left: -100px;
    }

    .hero-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 120px 24px 80px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px 6px 8px;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .hero-badge-dot {
      width: 22px; height: 22px;
      background: var(--accent-gradient);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem;
      color: #fff;
    }

    .hero-title {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.05;
      color: var(--text-primary);
      margin-bottom: 24px;
    }

    .hero-title-accent {
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-bio {
      font-size: 1.1rem;
      color: var(--text-secondary);
      line-height: 1.75;
      margin-bottom: 40px;
      max-width: 520px;
    }

    .hero-actions { display: flex; gap: 14px; flex-wrap: wrap; }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 28px;
      background: var(--accent-gradient);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: var(--transition);
      font-family: var(--font-primary);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(99,102,241,0.45);
    }

    .btn-secondary {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 13px 26px;
      background: var(--bg-surface);
      color: var(--text-primary);
      border: 1.5px solid var(--border-color);
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: var(--transition);
      font-family: var(--font-primary);
    }

    .btn-secondary:hover {
      background: var(--bg-surface-2);
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      margin-top: 48px;
      flex-wrap: wrap;
    }

    .hero-stat-item { text-align: left; }

    .hero-stat-number {
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-top: 4px;
    }

    .hero-visual {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hero-profile-frame {
      position: relative;
      width: 340px;
      height: 340px;
    }

    .hero-profile-ring {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      background: var(--accent-gradient);
      padding: 4px;
      animation: spin-slow 8s linear infinite;
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .hero-profile-ring-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: var(--bg-base);
    }

    .hero-profile-img {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      object-fit: cover;
      width: 100%; height: 100%;
    }

    .hero-profile-placeholder {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--bg-surface-2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 4rem;
    }

    .hero-float-card {
      position: absolute;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 12px 16px;
      box-shadow: var(--shadow-card);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      animation: float-anim 3s ease-in-out infinite;
    }

    .hero-float-card:nth-child(2) { animation-delay: 1s; }
    .hero-float-card:nth-child(3) { animation-delay: 2s; }

    @keyframes float-anim {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .float-card-1 { bottom: 20px; left: -40px; }
    .float-card-2 { top: 20px; right: -40px; }

    .float-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      color: #fff;
    }

    /* =============================================
       EXPERIENCE TIMELINE
    ============================================= */
    .timeline-container { position: relative; }

    .timeline-line {
      position: absolute;
      left: 27px;
      top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, var(--accent-primary), var(--accent-tertiary));
      opacity: 0.3;
    }

    .timeline-item {
      display: flex;
      gap: 32px;
      margin-bottom: 48px;
      position: relative;
    }

    .timeline-node {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: var(--accent-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.2rem;
      box-shadow: 0 4px 16px rgba(99,102,241,0.3);
      position: relative;
      z-index: 1;
    }

    .timeline-content {
      flex: 1;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-card);
      padding: 28px;
      transition: var(--transition);
    }

    .timeline-content:hover {
      border-color: var(--accent-primary);
      box-shadow: var(--shadow-hover);
      transform: translateX(4px);
    }

    .timeline-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .timeline-role {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .timeline-date {
      background: var(--bg-surface-2);
      border: 1px solid var(--border-color);
      color: var(--accent-primary);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .timeline-org {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--accent-primary);
      margin-bottom: 12px;
    }

    .timeline-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    .timeline-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .timeline-tag {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 6px;
      background: var(--bg-surface-2);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
    }

    /* =============================================
       PORTFOLIO CAROUSEL
    ============================================= */
    .carousel-outer { position: relative; }

    .carousel-track-wrapper {
      overflow: hidden;
      border-radius: var(--radius-card);
    }

    .carousel-track {
      display: flex;
      gap: 24px;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .portfolio-card {
      flex: 0 0 calc(33.333% - 16px);
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-card);
      overflow: hidden;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
    }

    @media (max-width: 1024px) {
      .portfolio-card { flex: 0 0 calc(50% - 12px); }
    }

    @media (max-width: 640px) {
      .portfolio-card { flex: 0 0 calc(100% - 0px); }
      .hero-inner { grid-template-columns: 1fr; gap: 48px; }
      .hero-visual { display: none; }
    }

    .portfolio-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-4px);
      border-color: var(--accent-primary);
    }

    .portfolio-card-thumb {
      height: 200px;
      background: var(--bg-surface-2);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .portfolio-card-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .portfolio-card:hover .portfolio-card-thumb img {
      transform: scale(1.05);
    }

    .portfolio-thumb-placeholder {
      font-size: 3.5rem;
      color: var(--text-muted);
    }

    .portfolio-card-type {
      position: absolute;
      top: 12px; right: 12px;
      background: var(--accent-gradient);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 4px 10px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .portfolio-card-body { padding: 22px; }

    .portfolio-card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .portfolio-card-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .portfolio-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .portfolio-card-tags { display: flex; gap: 6px; flex-wrap: wrap; }

    .portfolio-tag {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 5px;
      background: var(--bg-surface-2);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
    }

    .portfolio-card-cta {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: var(--bg-surface-2);
      border: 1px solid var(--border-color);
      color: var(--accent-primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      transition: var(--transition);
      flex-shrink: 0;
    }

    .portfolio-card:hover .portfolio-card-cta {
      background: var(--accent-gradient);
      color: #fff;
      border-color: transparent;
    }

    .carousel-controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 32px;
    }

    .carousel-btn {
      width: 48px; height: 48px;
      border-radius: 12px;
      border: 1.5px solid var(--border-color);
      background: var(--bg-surface);
      color: var(--text-primary);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
    }

    .carousel-btn:hover {
      background: var(--accent-gradient);
      border-color: transparent;
      color: #fff;
      transform: scale(1.05);
    }

    .carousel-dots {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
    }

    .carousel-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border-color);
      cursor: pointer;
      transition: var(--transition);
    }

    .carousel-dot.active {
      background: var(--accent-primary);
      width: 24px;
      border-radius: 4px;
    }

    /* =============================================
       APPLICATIONS MATRIX
    ============================================= */
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .app-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-card);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: var(--transition);
      cursor: default;
    }

    .app-card:hover {
      border-color: var(--accent-primary);
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .app-icon-box {
      width: 44px; height: 44px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      color: #fff;
      flex-shrink: 0;
    }

    .app-info { flex: 1; min-width: 0; }

    .app-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .app-category {
      font-size: 0.73rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .app-level {
      height: 3px;
      background: var(--bg-surface-2);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }

    .app-level-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--accent-gradient);
    }

    /* =============================================
       CONTACT SECTION
    ============================================= */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 48px;
    }

    @media (max-width: 768px) {
      .contact-grid { grid-template-columns: 1fr; }
      .career-grid { grid-template-columns: 1fr; }
    }

    .contact-info-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-card);
      padding: 32px;
    }

    .contact-info-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .contact-info-item:last-child { border-bottom: none; }

    .contact-info-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--bg-surface-2);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent-primary);
      font-size: 0.95rem;
      flex-shrink: 0;
    }

    .contact-info-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 2px;
    }

    .contact-info-value {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-primary);
    }

    .contact-form {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-card);
      padding: 36px;
    }

    .form-group { margin-bottom: 20px; }

    .form-label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .form-control {
      width: 100%;
      background: var(--bg-surface-2);
      border: 1.5px solid var(--border-color);
      border-radius: 10px;
      padding: 12px 16px;
      font-family: var(--font-primary);
      font-size: 0.9rem;
      color: var(--text-primary);
      transition: var(--transition);
      outline: none;
    }

    .form-control:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }

    .form-control::placeholder { color: var(--text-muted); }

    textarea.form-control { resize: vertical; min-height: 120px; }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--accent-gradient);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font-primary);
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(99,102,241,0.4);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* =============================================
       FOOTER
    ============================================= */
    footer {
      background: var(--bg-surface);
      border-top: 1px solid var(--border-color);
      padding: 48px 24px;
    }

    .footer-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 24px;
    }

    .footer-left { }

    .footer-logo {
      font-weight: 800;
      font-size: 1.1rem;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .footer-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .footer-social {
      display: flex;
      gap: 10px;
    }

    .social-btn {
      width: 40px; height: 40px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: var(--bg-surface-2);
      color: var(--text-secondary);
      text-decoration: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      transition: var(--transition);
    }

    .social-btn:hover {
      background: var(--accent-gradient);
      border-color: transparent;
      color: #fff;
      transform: translateY(-2px);
    }

    /* =============================================
       MODAL
    ============================================= */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(12px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-box {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      max-width: 860px;
      width: 100%;
      max-height: 90vh;
      overflow: hidden;
      transform: scale(0.95) translateY(20px);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      display: flex;
      flex-direction: column;
    }

    .modal-overlay.active .modal-box {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      padding: 24px 28px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .modal-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .modal-close {
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-surface-2);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
    }

    .modal-close:hover { background: #ef4444; color: #fff; border-color: #ef4444; }

    .modal-body {
      flex: 1;
      overflow: auto;
      padding: 28px;
    }

    .modal-media-frame {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--bg-surface-2);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .modal-media-frame img,
    .modal-media-frame iframe {
      width: 100%; height: 100%;
      object-fit: contain;
      border: none;
    }

    /* =============================================
       TOAST NOTIFICATIONS
    ============================================= */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 3000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-primary);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      max-width: 360px;
      animation: toast-in 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
      pointer-events: all;
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateX(40px) scale(0.9); }
      to { opacity: 1; transform: translateX(0) scale(1); }
    }

    .toast-icon { font-size: 1rem; }

    .toast.success .toast-icon { color: #22c55e; }
    .toast.error .toast-icon { color: #ef4444; }
    .toast.info .toast-icon { color: var(--accent-primary); }

    /* =============================================
       SECTION BACKGROUND VARIANTS
    ============================================= */
    .bg-variant-alt { background: var(--bg-surface); }
    .bg-variant-gradient {
      background: linear-gradient(135deg, rgba(99,102,241,0.05) 0%, rgba(6,182,212,0.05) 100%);
    }
    .bg-variant-dark {
      background: var(--bg-surface-2);
    }

    /* =============================================
       LOADING STATE
    ============================================= */
    #app-loader {
      position: fixed;
      inset: 0;
      background: var(--bg-base);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.5s ease;
    }

    .loader-logo {
      font-size: 2rem;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .loader-spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader-text {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* =============================================
       PRINT-ONLY RESUME STYLES
    ============================================= */
    #resume-print-workspace {
      display: none;
    }

    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

      body > *:not(#resume-print-workspace) {
        display: none !important;
      }

      #resume-print-workspace {
        display: block !important;
      }

      #app-loader { display: none !important; }

      .resume-page {
        width: 100%;
        min-height: 100vh;
        display: flex;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 10pt;
        line-height: 1.5;
        color: #1e293b;
        background: #ffffff;
      }

      .resume-sidebar {
        width: 33%;
        background: #1e2130 !important;
        color: #f1f5f9 !important;
        padding: 36pt 24pt;
        display: flex;
        flex-direction: column;
        gap: 24pt;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      .resume-main {
        width: 67%;
        padding: 36pt 32pt;
        display: flex;
        flex-direction: column;
        gap: 18pt;
      }

      .resume-profile-pic-wrap {
        display: flex;
        justify-content: center;
        margin-bottom: 8pt;
      }

      .resume-profile-pic {
        width: 90pt; height: 90pt;
        border-radius: 50%;
        object-fit: cover;
        border: 3pt solid #6366f1;
      }

      .resume-profile-placeholder-print {
        width: 90pt; height: 90pt;
        border-radius: 50%;
        background: #2d3554 !important;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32pt;
        color: #6366f1 !important;
        border: 3pt solid #6366f1;
        -webkit-print-color-adjust: exact !important;
      }

      .resume-sb-name {
        font-size: 15pt;
        font-weight: 800;
        color: #f1f5f9 !important;
        text-align: center;
        letter-spacing: -0.03em;
      }

      .resume-sb-title {
        font-size: 9pt;
        color: #94a3b8 !important;
        text-align: center;
        font-weight: 500;
        margin-top: 4pt;
      }

      .resume-sb-section { }

      .resume-sb-heading {
        font-size: 7pt;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #6366f1 !important;
        margin-bottom: 10pt;
        padding-bottom: 4pt;
        border-bottom: 1pt solid #2d3554;
        -webkit-print-color-adjust: exact !important;
      }

      .resume-contact-row {
        display: flex;
        align-items: center;
        gap: 8pt;
        margin-bottom: 8pt;
        font-size: 8.5pt;
        color: #cbd5e1 !important;
      }

      .resume-contact-row i {
        color: #6366f1 !important;
        width: 12pt;
        text-align: center;
        font-size: 8pt;
        -webkit-print-color-adjust: exact !important;
      }

      .resume-qual-list {
        list-style: none;
        padding: 0; margin: 0;
        display: flex;
        flex-direction: column;
        gap: 6pt;
      }

      .resume-qual-item {
        font-size: 8.5pt;
        color: #cbd5e1 !important;
        display: flex;
        align-items: flex-start;
        gap: 6pt;
        line-height: 1.4;
      }

      .resume-qual-item::before {
        content: '';
        width: 5pt; height: 5pt;
        border-radius: 50%;
        background: #6366f1 !important;
        flex-shrink: 0;
        margin-top: 4pt;
        -webkit-print-color-adjust: exact !important;
      }

      .resume-edu-item {
        margin-bottom: 10pt;
      }

      .resume-edu-degree {
        font-size: 9pt;
        font-weight: 700;
        color: #f1f5f9 !important;
      }

      .resume-edu-school {
        font-size: 8pt;
        color: #94a3b8 !important;
        margin-top: 2pt;
      }

      .resume-edu-year {
        font-size: 7.5pt;
        color: #6366f1 !important;
        margin-top: 2pt;
        font-weight: 600;
      }

      /* Main panel */
      .resume-header-accent {
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%) !important;
        padding: 20pt 24pt;
        border-radius: 10pt;
        margin-bottom: 4pt;
        -webkit-print-color-adjust: exact !important;
      }

      .resume-header-name {
        font-size: 22pt;
        font-weight: 800;
        color: #fff !important;
        letter-spacing: -0.04em;
        line-height: 1.1;
      }

      .resume-header-role {
        font-size: 10pt;
        color: rgba(255,255,255,0.85) !important;
        font-weight: 500;
        margin-top: 4pt;
      }

      .resume-section-title {
        font-size: 9pt;
        font-weight: 700;
        color: #6366f1 !important;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 10pt;
        padding-bottom: 4pt;
        border-bottom: 1.5pt solid #e2e8f0;
        display: flex;
        align-items: center;
        gap: 6pt;
        -webkit-print-color-adjust: exact !important;
      }

      .resume-section-title i {
        color: #6366f1 !important;
        -webkit-print-color-adjust: exact !important;
      }

      .resume-objective {
        font-size: 9pt;
        color: #475569 !important;
        line-height: 1.6;
      }

      .resume-skills-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8pt;
      }

      .resume-skill-chip {
        display: flex;
        align-items: center;
        gap: 6pt;
        background: #f1f5f9 !important;
        border-radius: 6pt;
        padding: 5pt 10pt;
        font-size: 8pt;
        font-weight: 600;
        color: #334155 !important;
        -webkit-print-color-adjust: exact !important;
      }

      .resume-skill-chip i {
        font-size: 8pt;
        color: #6366f1 !important;
        -webkit-print-color-adjust: exact !important;
      }

      .resume-exp-item {
        border-bottom: 0.75pt solid #e2e8f0;
        padding-bottom: 12pt;
        margin-bottom: 12pt;
      }

      .resume-exp-item:last-child {
        border-bottom: none;
        margin-bottom: 0;
      }

      .resume-exp-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 3pt;
      }

      .resume-exp-role {
        font-size: 10pt;
        font-weight: 700;
        color: #1e293b !important;
        display: flex;
        align-items: center;
        gap: 6pt;
      }

      .resume-exp-role i {
        color: #6366f1 !important;
        font-size: 9pt;
        -webkit-print-color-adjust: exact !important;
      }

      .resume-exp-date {
        font-size: 7.5pt;
        color: #6366f1 !important;
        font-weight: 600;
        background: #eef2ff !important;
        padding: 2pt 7pt;
        border-radius: 4pt;
        white-space: nowrap;
        -webkit-print-color-adjust: exact !important;
      }

      .resume-exp-org {
        font-size: 8.5pt;
        color: #6366f1 !important;
        font-weight: 600;
        margin-bottom: 5pt;
        -webkit-print-color-adjust: exact !important;
      }

      .resume-exp-desc {
        font-size: 8.5pt;
        color: #475569 !important;
        line-height: 1.5;
      }
    }

    /* =============================================
       SCROLL ANIMATIONS
    ============================================= */
    .fade-in-up {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .fade-in-up.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .stagger-1 { transition-delay: 0.1s; }
    .stagger-2 { transition-delay: 0.2s; }
    .stagger-3 { transition-delay: 0.3s; }
    .stagger-4 { transition-delay: 0.4s; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-primary); }

    /* =============================================
       MOBILE HAMBURGER MENU
    ============================================= */
    .nav-hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: var(--bg-surface);
      cursor: pointer;
      padding: 10px;
      transition: var(--transition);
      flex-shrink: 0;
    }

    .nav-hamburger:hover {
      background: var(--bg-surface-2);
      border-color: var(--accent-primary);
    }

    .nav-hamburger span {
      display: block;
      width: 100%;
      height: 2px;
      background: var(--text-primary);
      border-radius: 2px;
      transition: var(--transition);
      transform-origin: center;
    }

    .nav-hamburger.open span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }
    .nav-hamburger.open span:nth-child(2) {
      opacity: 0;
      transform: scaleX(0);
    }
    .nav-hamburger.open span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    /* Mobile nav drawer */
    .mobile-nav-drawer {
      display: none;
      position: fixed;
      top: 68px;
      left: 0; right: 0;
      background: var(--nav-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border-color);
      z-index: 999;
      padding: 12px 16px 20px;
      flex-direction: column;
      gap: 4px;
      transform: translateY(-10px);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .mobile-nav-drawer.open {
      transform: translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    .mobile-nav-drawer a {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      padding: 13px 16px;
      border-radius: 10px;
      transition: var(--transition);
      min-height: 48px;
    }

    .mobile-nav-drawer a:hover,
    .mobile-nav-drawer a:active {
      color: var(--text-primary);
      background: var(--bg-surface-2);
    }

    .mobile-nav-drawer a i {
      width: 20px;
      text-align: center;
      color: var(--accent-primary);
      font-size: 0.9rem;
    }

    .mobile-nav-divider {
      height: 1px;
      background: var(--border-color);
      margin: 8px 0;
    }

    .mobile-nav-resume {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 20px;
      background: var(--accent-gradient);
      color: #fff !important;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      font-family: var(--font-primary);
      margin-top: 4px;
      min-height: 48px;
    }

    /* =============================================
       MOBILE RESPONSIVE OVERRIDES (≤768px)
    ============================================= */
    @media (max-width: 768px) {

      /* --- Navigation --- */
      .nav-links { display: none !important; }

      .btn-resume { display: none; }

      .nav-hamburger { display: flex; }

      .mobile-nav-drawer { display: flex; }

      .nav-inner {
        padding: 0 16px;
        height: 60px;
      }

      .mobile-nav-drawer { top: 60px; }

      /* --- Section Spacing --- */
      .section-wrapper {
        padding: 64px 16px;
      }

      section {
        scroll-margin-top: 68px;
      }

      .section-title {
        font-size: clamp(1.5rem, 7vw, 2rem);
      }

      .section-desc {
        font-size: 0.95rem;
        margin-bottom: 36px;
      }

      /* --- Hero --- */
      .hero-inner {
        grid-template-columns: 1fr;
        gap: 40px;
        padding: 96px 16px 60px;
        text-align: center;
      }

      .hero-visual { display: none; }

      .hero-title {
        font-size: clamp(2rem, 9vw, 3rem);
      }

      .hero-bio {
        font-size: 0.95rem;
        margin-bottom: 28px;
        max-width: 100%;
      }

      .hero-badge { margin: 0 auto 20px; }

      .hero-actions {
        justify-content: center;
        gap: 12px;
      }

      .btn-primary,
      .btn-secondary {
        padding: 13px 22px;
        font-size: 0.9rem;
        min-height: 48px;
      }

      .hero-stats {
        justify-content: center;
        gap: 24px;
        margin-top: 32px;
      }

      .hero-stat-number { font-size: 1.75rem; }

      /* --- Timeline --- */
      .timeline-item {
        gap: 16px;
        margin-bottom: 32px;
      }

      .timeline-node {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        font-size: 1rem;
      }

      .timeline-line { left: 21px; }

      .timeline-content {
        padding: 18px;
      }

      .timeline-content:hover {
        transform: none;
      }

      .timeline-role { font-size: 1rem; }

      /* --- Portfolio Cards --- */
      .portfolio-card { flex: 0 0 calc(100% - 0px); }

      .carousel-btn {
        width: 44px;
        height: 44px;
      }

      /* --- Apps Grid --- */
      .apps-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .app-card {
        padding: 14px;
        gap: 10px;
      }

      .app-icon-box {
        width: 38px;
        height: 38px;
        font-size: 0.95rem;
      }

      .app-name { font-size: 0.82rem; }
      .app-category { font-size: 0.68rem; }

      /* --- Contact --- */
      .contact-grid {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .contact-info-card,
      .contact-form {
        padding: 20px;
      }

      /* --- Form inputs — bigger tap targets on mobile --- */
      .form-control {
        font-size: 1rem; /* prevents iOS zoom on focus */
        padding: 13px 14px;
        min-height: 48px;
      }

      textarea.form-control { min-height: 110px; }

      .btn-submit {
        min-height: 52px;
        font-size: 1rem;
      }

      /* --- Footer --- */
      footer { padding: 36px 16px; }

      .footer-inner {
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
      }

      /* --- Modal — full-screen on mobile --- */
      .modal-overlay {
        padding: 0;
        align-items: flex-end;
      }

      .modal-box {
        border-radius: 20px 20px 0 0;
        max-height: 92dvh;
        max-width: 100%;
        width: 100%;
        transform: translateY(40px);

    async function checkAndSeedDatabase() {
      try {
        const layoutSnap = await getDocs(collection(db, 'layout_configuration'));
        if (!layoutSnap.empty) {
          console.log('[Seed] Database already populated. Skipping seed.');
          return;
        }
        console.log('[Seed] Empty database detected. Running seed routine...');
        await runSeedRoutine();
        console.log('[Seed] Seed complete.');
      } catch (err) {
        console.warn('[Seed] Could not check/seed database. Using fallback state.', err.message);
        loadFallbackState();
      }
    }

    async function runSeedRoutine() {
      const batch = writeBatch(db);

      // Seed profile
      batch.set(doc(db, 'profile', 'main'), SEED_DATA.profile);

      // Seed layout
      SEED_DATA.layout.forEach(item => {
        batch.set(doc(db, 'layout_configuration', item.id), item);
      });

      // Seed experience
      SEED_DATA.experience.forEach((item, i) => {
        batch.set(doc(db, 'experience', `exp_${i + 1}`), item);
      });

      // Seed portfolio
      SEED_DATA.portfolio.forEach((item, i) => {
        batch.set(doc(db, 'portfolio', `port_${i + 1}`), item);
      });

      // Seed applications
      SEED_DATA.applications.forEach((item, i) => {
        batch.set(doc(db, 'applications', `app_${i + 1}`), item);
      });

      await batch.commit();
    }

      window.__portfolioState.profile = SEED_DATA.profile;
      window.__portfolioState.layout = SEED_DATA.layout;
      window.__portfolioState.experience = SEED_DATA.experience;
      window.__portfolioState.portfolio = SEED_DATA.portfolio;
      window.__portfolioState.applications = SEED_DATA.applications;
    }

      const [profileSnap, layoutSnap, expSnap, portSnap, appsSnap] = await Promise.all([
        getDoc(doc(db, 'profile', 'main')),
        getDocs(collection(db, 'layout_configuration')),
        getDocs(query(collection(db, 'experience'), orderBy('order', 'asc'))),
        getDocs(query(collection(db, 'portfolio'), orderBy('order', 'asc'))),
        getDocs(query(collection(db, 'applications'), orderBy('order', 'asc')))
      ]);

      window.__portfolioState.profile = profileSnap.exists() ? profileSnap.data() : SEED_DATA.profile;

      const layout = [];
      layoutSnap.forEach(d => layout.push({ id: d.id, ...d.data() }));
      window.__portfolioState.layout = layout.sort((a, b) => a.order - b.order);

      const experience = [];
      expSnap.forEach(d => experience.push({ id: d.id, ...d.data() }));
      window.__portfolioState.experience = experience;

      const portfolio = [];
      portSnap.forEach(d => portfolio.push({ id: d.id, ...d.data() }));
      window.__portfolioState.portfolio = portfolio;

      const applications = [];
      appsSnap.forEach(d => applications.push({ id: d.id, ...d.data() }));
      window.__portfolioState.applications = applications;
    }

      };

        'PPT': '<i class="fa-solid fa-file-powerpoint portfolio-thumb-placeholder" style="color:#ef4444"></i>',
        'PDF': '<i class="fa-solid fa-file-pdf portfolio-thumb-placeholder" style="color:#f59e0b"></i>',
        'Image': '<i class="fa-solid fa-image portfolio-thumb-placeholder" style="color:#22c55e"></i>',
        'Site': '<i class="fa-solid fa-globe portfolio-thumb-placeholder" style="color:#06b6d4"></i>',
        'URL': '<i class="fa-solid fa-link portfolio-thumb-placeholder" style="color:#3b82f6"></i>'
      };

      portfolio.forEach((item, i) => {
        const typeInfo = typeIconMap[item.type] || { icon: 'fa-solid fa-folder', color: '#6366f1' };
        const thumbContent = item.thumbnailUrl
          ? `<img src="${item.thumbnailUrl}" alt="${item.title}" loading="lazy" />`
          : (thumbPlaceholders[item.type] || '<i class="fa-solid fa-folder portfolio-thumb-placeholder"></i>');

        const card = document.createElement('div');
        card.className = 'portfolio-card';
        card.innerHTML = `
          <div class="portfolio-card-thumb">
            ${thumbContent}
            <div class="portfolio-card-type">${item.type || 'Project'}</div>
          </div>
          <div class="portfolio-card-body">
            <div class="portfolio-card-title">${item.title || ''}</div>
            <p class="portfolio-card-desc">${item.description || ''}</p>
            <div class="portfolio-card-footer">
              <div class="portfolio-card-tags">
                ${(item.tags || []).slice(0, 3).map(t => `<span class="portfolio-tag">${t}</span>`).join('')}
              </div>
              <div class="portfolio-card-cta" title="Open ${item.type}">
                <i class="${typeInfo.icon}"></i>
              </div>
            </div>
          </div>
        `;
        card.addEventListener('click', () => openPortfolioModal(item, typeInfo));
        track.appendChild(card);

        const dot = document.createElement('div');
        dot.className = `carousel-dot ${i === 0 ? 'active' : ''}`;
        dot.addEventListener('click', () => goToSlide(i, track, dotsContainer));
        dotsContainer.appendChild(dot);
      });

      // Carousel logic
      let currentSlide = 0;
      const visibleCards = () => window.innerWidth >= 1024 ? 3 : window.innerWidth >= 640 ? 2 : 1;

      function goToSlide(index, trackEl, dotsEl) {
        const cards = trackEl.querySelectorAll('.portfolio-card');
        const visible = visibleCards();
        const maxIndex = Math.max(0, cards.length - visible);
        currentSlide = Math.max(0, Math.min(index, maxIndex));
        const cardWidth = cards[0]?.offsetWidth || 0;
        const gap = 24;
        trackEl.style.transform = `translateX(-${currentSlide * (cardWidth + gap)}px)`;
        dotsEl.querySelectorAll('.carousel-dot').forEach((d, i) => {
          d.classList.toggle('active', i === currentSlide);
        });
      }

      el.querySelector('#carousel-prev').addEventListener('click', () => goToSlide(currentSlide - 1, track, dotsContainer));
      el.querySelector('#carousel-next').addEventListener('click', () => goToSlide(currentSlide + 1, track, dotsContainer));

      return el;
    }

    // =============================================

    // =============================================
    function initScrollAnimations() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -60px 0px' });

      document.querySelectorAll('.fade-in-up').forEach(el => observer.observe(el));
    }

    // =============================================
    // MOBILE HAMBURGER MENU
    // =============================================
    (function initMobileNav() {
      const hamburger = document.getElementById('nav-hamburger');
      const drawer    = document.getElementById('mobile-nav-drawer');
      if (!hamburger || !drawer) return;

      function openMobileNav() {
        hamburger.classList.add('open');
        drawer.classList.add('open');
        hamburger.setAttribute('aria-expanded', 'true');
        document.body.style.overflow = 'hidden';
      }

      window.closeMobileNav = function() {
        hamburger.classList.remove('open');
        drawer.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
        document.body.style.overflow = '';
      };

      hamburger.addEventListener('click', () => {
        if (drawer.classList.contains('open')) {
          closeMobileNav();
        } else {
          openMobileNav();
        }
      });

      // Close drawer when any nav link is tapped
      drawer.querySelectorAll('.mobile-nav-link').forEach(link => {
        link.addEventListener('click', () => closeMobileNav());
      });

      // Close drawer on outside tap
      document.addEventListener('click', (e) => {
        if (
          drawer.classList.contains('open') &&
          !drawer.contains(e.target) &&
          !hamburger.contains(e.target)
        ) {
          closeMobileNav();
        }
      });

      // Close drawer on Escape key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && drawer.classList.contains('open')) {
          closeMobileNav();
        }
      });

      // Close drawer if viewport resizes to desktop
      window.addEventListener('resize', () => {
        if (window.innerWidth > 768) closeMobileNav();
      });
    })();
