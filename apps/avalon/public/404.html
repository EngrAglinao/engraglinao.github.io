<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AVALON — Redirecting...</title>
    <style>
      body { background: #09090b; color: #d97706; font-family: Georgia, serif;
             display: flex; align-items: center; justify-content: center;
             min-height: 100vh; margin: 0; flex-direction: column; gap: 12px; }
      p { color: #6b7280; font-size: 14px; }
    </style>
    <script>
      // GitHub Pages SPA redirect fix
      // Saves the current URL and redirects to index.html
      // index.html then restores the route
      var l = window.location;
      var pathSegmentsToKeep = 1; // change to 0 for custom domain
      var redirectUrl = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
        '/?p=' + l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash;
      l.replace(redirectUrl);
    </script>
  </head>
  <body>
    <h2>⚜️ AVALON</h2>
    <p>Redirecting to game...</p>
  </body>
</html>
