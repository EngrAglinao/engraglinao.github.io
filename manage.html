<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio CMS — Admin Control Panel</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- Tailwind CSS Browser -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    :root {
      --accent: #6366f1;
      --accent-light: #818cf8;
      --accent-dark: #4f46e5;
      --accent-glow: rgba(99,102,241,0.18);
    }
    * { font-family: 'Plus Jakarta Sans', sans-serif; }

    html.dark body { background: #0a0c12; color: #e2e8f0; }
    html.dark .panel-bg { background: #0f1117; border-color: #2d3448; }
    html.dark .card-bg { background: #1a1f2e; border-color: #2d3448; }
    html.dark .input-field { background: #1a1f2e; border-color: #2d3448; color: #e2e8f0; }
    html.dark .tab-active { background: var(--accent); color: #fff; }
    html.dark .tab-inactive { background: #1a1f2e; color: #94a3b8; }
    html.dark .sidebar-bg { background: #0d0f18; border-color: #2d3448; }
    html.dark .item-row { background: #1a1f2e; border-color: #2d3448; }
    html.dark .header-bar { background: #0d0f18; border-color: #2d3448; }
    html.dark .section-label { color: #94a3b8; }
    html.dark .toast-bg { background: #1a1f2e; border-color: #2d3448; color: #e2e8f0; }

    html:not(.dark) body { background: #f1f5f9; color: #1e293b; }
    html:not(.dark) .panel-bg { background: #f8fafc; border-color: #e2e8f0; }
    html:not(.dark) .card-bg { background: #ffffff; border-color: #e2e8f0; }
    html:not(.dark) .input-field { background: #ffffff; border-color: #cbd5e1; color: #1e293b; }
    html:not(.dark) .tab-active { background: var(--accent); color: #fff; }
    html:not(.dark) .tab-inactive { background: #e2e8f0; color: #64748b; }
    html:not(.dark) .sidebar-bg { background: #ffffff; border-color: #e2e8f0; }
    html:not(.dark) .item-row { background: #f8fafc; border-color: #e2e8f0; }
    html:not(.dark) .header-bar { background: #ffffff; border-color: #e2e8f0; }
    html:not(.dark) .section-label { color: #64748b; }
    html:not(.dark) .toast-bg { background: #1e293b; border-color: #2d3448; color: #fff; }

    .accent { color: var(--accent); }
    .btn-accent { background: linear-gradient(135deg,var(--accent),var(--accent-dark)); color:#fff; border-radius:.6rem; font-weight:600; padding:.5rem 1rem; transition:all .2s; border:none; cursor:pointer; }
    .btn-accent:hover { transform:translateY(-1px); box-shadow: 0 4px 14px var(--accent-glow); }
    .btn-danger { background:#ef4444; color:#fff; border-radius:.6rem; font-weight:600; padding:.4rem .8rem; border:none; cursor:pointer; transition:all .2s; }
    .btn-danger:hover { background:#dc2626; }
    .btn-ghost { background:transparent; border:1.5px solid var(--accent); color:var(--accent); border-radius:.6rem; font-weight:600; padding:.4rem .8rem; cursor:pointer; transition:all .2s; }
    .btn-ghost:hover { background:var(--accent); color:#fff; }
    .btn-sm { padding:.3rem .7rem; font-size:.78rem; }
    .btn-warning { background:#f59e0b; color:#fff; border-radius:.6rem; font-weight:600; padding:.4rem .8rem; border:none; cursor:pointer; transition:all .2s; }
    .btn-warning:hover { background:#d97706; }

    .input-field { border:1px solid; border-radius:.5rem; padding:.55rem .85rem; width:100%; outline:none; transition:border-color .2s; font-size:.88rem; }
    .input-field:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
    textarea.input-field { resize:vertical; }

    .panel-bg { border:1px solid; border-radius:1rem; }
    .card-bg { border:1px solid; border-radius:.75rem; }
    .item-row { border:1px solid; border-radius:.6rem; padding:.75rem 1rem; }

    /* TABS */
    .tab-btn { padding:.45rem 1rem; border-radius:.5rem; font-size:.82rem; font-weight:600; cursor:pointer; transition:all .15s; border:none; }

    /* SPLIT LAYOUT */
    .split-left { width:50%; overflow-y:auto; height:calc(100vh - 56px); border-right:1px solid; }
    .split-right { width:50%; height:calc(100vh - 56px); }
    html.dark .split-left { border-color:#2d3448; }
    html:not(.dark) .split-left { border-color:#e2e8f0; }

    /* HEADER */
    .header-bar { border-bottom:1px solid; position:sticky; top:0; z-index:40; }

    /* TOAST */
    .toast { position:fixed; bottom:1.5rem; right:1.5rem; z-index:9999; padding:.75rem 1.25rem; border-radius:.75rem; border:1px solid; font-size:.85rem; font-weight:600; display:flex; align-items:center; gap:.6rem; box-shadow:0 8px 32px rgba(0,0,0,.25); transform:translateY(80px); opacity:0; transition:all .3s; }
    .toast.show { transform:none; opacity:1; }

    /* SECTION NAV */
    .section-nav-item { padding:.55rem .9rem; border-radius:.5rem; cursor:pointer; font-size:.85rem; font-weight:500; transition:all .15s; }
    html.dark .section-nav-item:hover, html.dark .section-nav-item.active { background:var(--accent-glow); color:var(--accent); }
    html:not(.dark) .section-nav-item:hover, html:not(.dark) .section-nav-item.active { background:var(--accent-glow); color:var(--accent); }

    /* DRAG HANDLE */
    .drag-handle { cursor:grab; color:#94a3b8; }
    .drag-handle:active { cursor:grabbing; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-thumb { background:var(--accent); border-radius:99px; }

    /* LOADER */
    .loader-ring { width:20px; height:20px; border:3px solid transparent; border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .fade-in { animation:fadeIn .3s ease forwards; }
    @keyframes fadeIn { from { opacity:0;transform:translateY(8px); } to { opacity:1;transform:none; } }

    label.form-label { display:block; font-size:.8rem; font-weight:700; margin-bottom:.3rem; text-transform:uppercase; letter-spacing:.04em; }
    html.dark label.form-label { color:#94a3b8; }
    html:not(.dark) label.form-label { color:#64748b; }

    .pill-badge { display:inline-flex; align-items:center; gap:.3rem; padding:.2rem .6rem; border-radius:9999px; font-size:.72rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; background:var(--accent-glow); color:var(--accent); border:1px solid var(--accent); }
    .collapsible-content { overflow:hidden; transition:max-height .3s ease; max-height:0; }
    .collapsible-content.open { max-height:2000px; }

    .section-divider { height:1px; margin:1.5rem 0; }
    html.dark .section-divider { background:#2d3448; }
    html:not(.dark) .section-divider { background:#e2e8f0; }

    .reorder-btn { width:26px; height:26px; border-radius:.4rem; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; font-size:.75rem; border:none; transition:all .15s; }
    html.dark .reorder-btn { background:#2d3448; color:#94a3b8; }
    html:not(.dark) .reorder-btn { background:#e2e8f0; color:#64748b; }
    .reorder-btn:hover { background:var(--accent); color:#fff; }

    .visibility-toggle { width:38px; height:22px; border-radius:9999px; position:relative; cursor:pointer; transition:background .2s; border:none; }
    .visibility-toggle.on { background:var(--accent); }
    .visibility-toggle.off { background:#94a3b8; }
    .visibility-toggle::after { content:''; position:absolute; top:2px; width:18px; height:18px; border-radius:50%; background:#fff; transition:left .2s; }
    .visibility-toggle.on::after { left:18px; }
    .visibility-toggle.off::after { left:2px; }
  </style>
</head>
<body>

<!-- ═══════════════ TOAST NOTIFICATION ═══════════════ -->
<div id="toast" class="toast toast-bg">
  <i id="toast-icon" class="fa-solid fa-check-circle accent"></i>
  <span id="toast-msg">Done!</span>
</div>

<!-- ═══════════════ HEADER BAR ═══════════════ -->
<div class="header-bar header-bar px-5 py-3 flex items-center justify-between" style="background:inherit">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:var(--accent)">
      <i class="fa-solid fa-sliders text-white text-sm"></i>
    </div>
    <div>
      <p class="font-bold text-sm leading-none">Portfolio CMS</p>
      <p class="text-xs section-label leading-none mt-0.5">Admin Control Panel</p>
    </div>
  </div>
  <div class="flex items-center gap-3">
    <div id="db-status" class="pill-badge text-xs">
      <div class="loader-ring" style="width:10px;height:10px;border-width:2px;"></div> Connecting...
    </div>
    <button id="seed-all-btn" onclick="seedAllData()" class="btn-warning btn-sm flex items-center gap-2">
      <i class="fa-solid fa-seedling"></i> Seed All Sample Data
    </button>
    <button id="theme-toggle" class="btn-ghost btn-sm">
      <i class="fa-solid fa-moon" id="theme-icon"></i>
    </button>
    <a href="index.html" target="_blank" class="btn-ghost btn-sm flex items-center gap-2">
      <i class="fa-solid fa-arrow-up-right-from-square"></i> View Site
    </a>
  </div>
</div>

<!-- ═══════════════ SPLIT LAYOUT ═══════════════ -->
<div class="flex" style="height:calc(100vh - 56px)">

  <!-- LEFT PANEL: CMS CONTROLS -->
  <div class="split-left panel-bg">
    <div class="p-5">

      <!-- SECTION NAVIGATOR TABS -->
      <div class="flex flex-wrap gap-2 mb-6" id="section-tabs">
        <button class="tab-btn tab-active" onclick="switchTab('hero')">
          <i class="fa-solid fa-user mr-1"></i> Hero
        </button>
        <button class="tab-btn tab-inactive" onclick="switchTab('experience')">
          <i class="fa-solid fa-briefcase mr-1"></i> Experience
        </button>
        <button class="tab-btn tab-inactive" onclick="switchTab('portfolio')">
          <i class="fa-solid fa-layer-group mr-1"></i> Portfolio
        </button>
        <button class="tab-btn tab-inactive" onclick="switchTab('skills')">
          <i class="fa-solid fa-microchip mr-1"></i> Skills
        </button>
        <button class="tab-btn tab-inactive" onclick="switchTab('layout')">
          <i class="fa-solid fa-table-columns mr-1"></i> Layout
        </button>
        <button class="tab-btn tab-inactive" onclick="switchTab('coretext')">
          <i class="fa-solid fa-text-height mr-1"></i> Text
        </button>
        <button class="tab-btn tab-inactive" onclick="switchTab('messages')">
          <i class="fa-solid fa-inbox mr-1"></i> Messages
        </button>
      </div>

      <!-- ═══ TAB: HERO ═══ -->
      <div id="tab-hero" class="tab-panel fade-in">
        <div class="space-y-4">
          <div class="flex items-center gap-2 mb-3">
            <div class="pill-badge"><i class="fa-solid fa-user"></i> Hero / About Me</div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div><label class="form-label">Full Name</label><input id="h-name" class="input-field" placeholder="John Doe" /></div>
            <div><label class="form-label">Initials / Brand</label><input id="h-initials" class="input-field" placeholder="JD" /></div>
          </div>
          <div><label class="form-label">Role / Title</label><input id="h-role" class="input-field" placeholder="Senior Frontend Engineer" /></div>
          <div><label class="form-label">Headline HTML</label><textarea id="h-headline" class="input-field" rows="2" placeholder='Building <span class="accent">Digital</span> Experiences'></textarea></div>
          <div><label class="form-label">Biography</label><textarea id="h-bio" class="input-field" rows="4" placeholder="Short biography paragraph..."></textarea></div>
          <div><label class="form-label">Career Objective (for Resume)</label><textarea id="h-objective" class="input-field" rows="3" placeholder="Driven engineer seeking..."></textarea></div>
          <div><label class="form-label">Summary Bullets (pipe | separated)</label><textarea id="h-summary" class="input-field" rows="2" placeholder="5+ years experience | Full-stack expertise | Team leadership"></textarea></div>
          <div><label class="form-label">Availability Pill Text</label><input id="h-pill" class="input-field" placeholder="Available for Work" /></div>
          <div><label class="form-label">Avatar Image URL</label><input id="h-avatar" class="input-field" placeholder="https://..." /></div>
          <div><label class="form-label">Tagline (Footer)</label><input id="h-tagline" class="input-field" placeholder="Building the web, one pixel at a time." /></div>
          <div class="grid grid-cols-2 gap-3">
            <div><label class="form-label">Email</label><input id="h-email" class="input-field" placeholder="you@email.com" /></div>
            <div><label class="form-label">Phone</label><input id="h-phone" class="input-field" placeholder="+1 234 567 8900" /></div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div><label class="form-label">Location</label><input id="h-location" class="input-field" placeholder="City, Country" /></div>
            <div><label class="form-label">Website</label><input id="h-website" class="input-field" placeholder="https://..." /></div>
          </div>
          <div><label class="form-label">Resume Download URL</label><input id="h-resumeurl" class="input-field" placeholder="https://..." /></div>

          <div class="section-divider"></div>
          <p class="font-bold text-sm mb-3">Education (for Resume Sidebar)</p>
          <div id="education-list" class="space-y-2 mb-3"></div>
          <button onclick="addEducationRow()" class="btn-ghost btn-sm flex items-center gap-2 mb-4">
            <i class="fa-solid fa-plus"></i> Add Education
          </button>

          <div class="section-divider"></div>
          <p class="font-bold text-sm mb-3">Stats / Counters</p>
          <div id="stats-list" class="space-y-2 mb-3"></div>
          <button onclick="addStatRow()" class="btn-ghost btn-sm flex items-center gap-2 mb-4">
            <i class="fa-solid fa-plus"></i> Add Stat
          </button>

          <div class="section-divider"></div>
          <p class="font-bold text-sm mb-3">Social Links</p>
          <div id="socials-list" class="space-y-2 mb-3"></div>
          <button onclick="addSocialRow()" class="btn-ghost btn-sm flex items-center gap-2 mb-4">
            <i class="fa-solid fa-plus"></i> Add Social Link
          </button>

          <button onclick="saveHero()" class="btn-accent w-full flex items-center justify-center gap-2">
            <i class="fa-solid fa-floppy-disk"></i> Save Hero Config
          </button>
        </div>
      </div>

      <!-- ═══ TAB: EXPERIENCE ═══ -->
      <div id="tab-experience" class="tab-panel hidden fade-in">
        <div class="flex items-center justify-between mb-4">
          <div class="pill-badge"><i class="fa-solid fa-briefcase"></i> Experience Timeline</div>
          <button onclick="openExpForm(null)" class="btn-accent btn-sm flex items-center gap-2">
            <i class="fa-solid fa-plus"></i> Add Entry
          </button>
        </div>
        <div id="experience-list" class="space-y-3 mb-4">
          <div class="flex items-center gap-2 text-sm section-label">
            <div class="loader-ring"></div> Loading...
          </div>
        </div>

        <!-- Experience Form -->
        <div id="exp-form-wrap" class="card-bg p-5 hidden mt-4">
          <p class="font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-pen accent"></i> <span id="exp-form-title">Add Experience</span></p>
          <input type="hidden" id="exp-doc-id" />
          <div class="space-y-3">
            <div class="grid grid-cols-2 gap-3">
              <div><label class="form-label">Role / Position</label><input id="exp-role" class="input-field" placeholder="Senior Developer" /></div>
              <div><label class="form-label">Organization</label><input id="exp-org" class="input-field" placeholder="Acme Corp" /></div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div><label class="form-label">Date Range</label><input id="exp-date" class="input-field" placeholder="Jan 2022 – Present" /></div>
              <div><label class="form-label">FA Icon Class</label><input id="exp-icon" class="input-field" placeholder="fa-solid fa-briefcase" /></div>
            </div>
            <div><label class="form-label">Description</label><textarea id="exp-desc" class="input-field" rows="3" placeholder="Responsibilities and achievements..."></textarea></div>
            <div><label class="form-label">Tags (comma separated)</label><input id="exp-tags" class="input-field" placeholder="React, Node.js, AWS" /></div>
            <div><label class="form-label">Order (number)</label><input id="exp-order" class="input-field" type="number" placeholder="1" value="1" /></div>
            <div class="flex gap-3">
              <button onclick="saveExpEntry()" class="btn-accent flex items-center gap-2"><i class="fa-solid fa-floppy-disk"></i> Save</button>
              <button onclick="cancelExpForm()" class="btn-ghost">Cancel</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ═══ TAB: PORTFOLIO ═══ -->
      <div id="tab-portfolio" class="tab-panel hidden fade-in">
        <div class="flex items-center justify-between mb-4">
          <div class="pill-badge"><i class="fa-solid fa-layer-group"></i> Portfolio Assets</div>
          <button onclick="openPortForm(null)" class="btn-accent btn-sm flex items-center gap-2">
            <i class="fa-solid fa-plus"></i> Add Asset
          </button>
        </div>
        <div id="portfolio-list" class="space-y-3 mb-4">
          <div class="flex items-center gap-2 text-sm section-label">
            <div class="loader-ring"></div> Loading...
          </div>
        </div>

        <!-- Portfolio Form -->
        <div id="port-form-wrap" class="card-bg p-5 hidden mt-4">
          <p class="font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-pen accent"></i> <span id="port-form-title">Add Portfolio Item</span></p>
          <input type="hidden" id="port-doc-id" />
          <div class="space-y-3">
            <div><label class="form-label">Title</label><input id="port-title" class="input-field" placeholder="Project Title" /></div>
            <div><label class="form-label">Description</label><textarea id="port-desc" class="input-field" rows="2" placeholder="Brief description..." /></div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="form-label">Type</label>
                <select id="port-type" class="input-field">
                  <option>PPT</option><option>Image</option><option>URL</option>
                  <option>Site</option><option>PDF</option><option>Video</option>
                </select>
              </div>
              <div><label class="form-label">Order</label><input id="port-order" class="input-field" type="number" value="1" /></div>
            </div>
            <div><label class="form-label">Asset URL (link / embed)</label><input id="port-url" class="input-field" placeholder="https://..." /></div>
            <div><label class="form-label">Thumbnail Image URL</label><input id="port-thumb" class="input-field" placeholder="https://..." /></div>
            <div class="flex gap-3">
              <button onclick="savePortEntry()" class="btn-accent flex items-center gap-2"><i class="fa-solid fa-floppy-disk"></i> Save</button>
              <button onclick="cancelPortForm()" class="btn-ghost">Cancel</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ═══ TAB: SKILLS ═══ -->
      <div id="tab-skills" class="tab-panel hidden fade-in">
        <div class="flex items-center justify-between mb-4">
          <div class="pill-badge"><i class="fa-solid fa-microchip"></i> Application Matrix</div>
          <button onclick="openSkillForm(null)" class="btn-accent btn-sm flex items-center gap-2">
            <i class="fa-solid fa-plus"></i> Add Skill
          </button>
        </div>
        <div id="skills-list" class="space-y-3 mb-4">
          <div class="flex items-center gap-2 text-sm section-label">
            <div class="loader-ring"></div> Loading...
          </div>
        </div>

        <!-- Skill Form -->
        <div id="skill-form-wrap" class="card-bg p-5 hidden mt-4">
          <p class="font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-pen accent"></i> <span id="skill-form-title">Add Skill</span></p>
          <input type="hidden" id="skill-doc-id" />
          <div class="space-y-3">
            <div class="grid grid-cols-2 gap-3">
              <div><label class="form-label">Skill Name</label><input id="skill-name" class="input-field" placeholder="React.js" /></div>
              <div><label class="form-label">Category</label><input id="skill-cat" class="input-field" placeholder="Frontend" /></div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div><label class="form-label">FA Icon Class</label><input id="skill-icon" class="input-field" placeholder="fa-brands fa-react" /></div>
              <div><label class="form-label">Icon Color (hex)</label><input id="skill-color" class="input-field" type="color" value="#6366f1" /></div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div><label class="form-label">Proficiency Level</label><input id="skill-level" class="input-field" placeholder="Advanced" /></div>
              <div><label class="form-label">Order</label><input id="skill-order" class="input-field" type="number" value="1" /></div>
            </div>
            <div class="flex gap-3">
              <button onclick="saveSkillEntry()" class="btn-accent flex items-center gap-2"><i class="fa-solid fa-floppy-disk"></i> Save</button>
              <button onclick="cancelSkillForm()" class="btn-ghost">Cancel</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ═══ TAB: LAYOUT ═══ -->
      <div id="tab-layout" class="tab-panel hidden fade-in">
        <div class="pill-badge mb-4"><i class="fa-solid fa-table-columns"></i> Layout & Section Control</div>
        <p class="text-sm section-label mb-5">Toggle visibility and change background style for each section. Drag order to rearrange.</p>

        <div id="layout-sections-list" class="space-y-3 mb-6">
          <div class="flex items-center gap-2 text-sm section-label">
            <div class="loader-ring"></div> Loading...
          </div>
        </div>

        <div class="section-divider"></div>
        <p class="font-bold text-sm mb-3">Site Metadata</p>
        <div class="space-y-3">
          <div><label class="form-label">Last Updated</label><input id="layout-lastupdated" class="input-field" placeholder="2024-01-01" /></div>
        </div>
        <button onclick="saveLayout()" class="btn-accent w-full mt-4 flex items-center justify-center gap-2">
          <i class="fa-solid fa-floppy-disk"></i> Save Layout Config
        </button>
      </div>

      <!-- ═══ TAB: CORE TEXT ═══ -->
      <div id="tab-coretext" class="tab-panel hidden fade-in">
        <div class="pill-badge mb-4"><i class="fa-solid fa-text-height"></i> Section Headings & Copy</div>
        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-3">

<!-- ═══════════════ FIREBASE ═══════════════ -->
<script type="module">
  // ─── FIREBASE CONFIGURATION ─────────────────────────────────────────────────
  // Replace with your actual Firebase project credentials (same as index.html).
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import {
    getFirestore, doc, getDoc, setDoc, collection, getDocs,
    addDoc, deleteDoc, updateDoc, serverTimestamp, query, orderBy
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
    projectId:         "YOUR_PROJECT_ID",
    storageBucket:     "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ─── HELPERS ─────────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  let activeTab = 'hero';

  // THEME
  function applyTheme(dark) {
    document.documentElement.classList.toggle('dark', dark);
    $('theme-icon').className = dark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    localStorage.setItem('theme', dark ? 'dark' : 'light');
  }
  (function initTheme() {
    const saved = localStorage.getItem('theme');
    applyTheme(saved ? saved === 'dark' : true);
  })();
  $('theme-toggle').addEventListener('click', () => applyTheme(!document.documentElement.classList.contains('dark')));

  // TOAST
  function toast(msg, type='success') {
    const t = $('toast');
    const icons = { success:'fa-check-circle', error:'fa-circle-xmark', info:'fa-circle-info', warning:'fa-triangle-exclamation' };
    const colors = { success:'#10b981', error:'#ef4444', info:'#6366f1', warning:'#f59e0b' };
    $('toast-icon').className = `fa-solid ${icons[type]||'fa-check-circle'}`;
    $('toast-icon').style.color = colors[type]||'#10b981';
    $('toast-msg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  // PREVIEW REFRESH
  window.refreshPreview = () => { $('preview-frame').src = $('preview-frame').src; };

  // TAB SWITCHING
  window.switchTab = function(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
    document.querySelectorAll('.tab-btn').forEach(b => { b.className = 'tab-btn tab-inactive'; });
    const panel = $(`tab-${tab}`);
    const btn = [...document.querySelectorAll('.tab-btn')].find(b => b.textContent.toLowerCase().includes(tab.slice(0,4)));
    if (panel) { panel.classList.remove('hidden'); panel.classList.add('fade-in'); }
    if (btn) btn.className = 'tab-btn tab-active';
    if (tab === 'experience') loadExperience();
    if (tab === 'portfolio')  loadPortfolio();
    if (tab === 'skills')     loadSkills();
    if (tab === 'layout')     loadLayout();
    if (tab === 'coretext')   loadCoreText();
    if (tab === 'messages')   loadMessages();
  };

  // ─── DB STATUS ────────────────────────────────────────────────────────────────
  async function checkDbStatus() {
    try {
      await getDoc(doc(db, 'config', 'hero'));
      $('db-status').innerHTML = '<i class="fa-solid fa-circle-check" style="color:#10b981"></i> Firestore Connected';
      $('db-status').style.borderColor = '#10b981';
      $('db-status').style.color = '#10b981';
      loadHero();
    } catch(e) {
      $('db-status').innerHTML = '<i class="fa-solid fa-circle-xmark" style="color:#ef4444"></i> Not Configured';
      $('db-status').style.borderColor = '#ef4444';
      $('db-status').style.color = '#ef4444';
    }
  }
  checkDbStatus();

  // ─── HERO ─────────────────────────────────────────────────────────────────────
  let eduRows = [], statRows = [], socialRows = [];

  async function loadHero() {
    try {
      const [heroSnap, socialsSnap, statsSnap] = await Promise.all([
        getDoc(doc(db,'config','hero')),
        getDoc(doc(db,'config','socials')),
        getDoc(doc(db,'config','stats')),
      ]);
      if (heroSnap.exists()) {
        const h = heroSnap.data();
        $('h-name').value    = h.name||'';
        $('h-initials').value = h.initials||'';
        $('h-role').value    = h.role||'';
        $('h-headline').value = h.headline||'';
        $('h-bio').value     = h.bio||'';
        $('h-objective').value = h.objective||'';
        $('h-summary').value = h.summary||'';
        $('h-pill').value    = h.pill||'';
        $('h-avatar').value  = h.avatar||'';
        $('h-tagline').value = h.tagline||'';
        $('h-email').value   = h.email||'';
        $('h-phone').value   = h.phone||'';
        $('h-location').value = h.location||'';
        $('h-website').value = h.website||'';
        $('h-resumeurl').value = h.resumeUrl||'';
        eduRows = h.education || [];
        renderEduRows();
      }
      if (socialsSnap.exists()) { socialRows = socialsSnap.data().items||[]; renderSocialRows(); }
      if (statsSnap.exists())   { statRows   = statsSnap.data().items||[];   renderStatRows(); }
    } catch(e) { console.error(e); }
  }

  window.saveHero = async function() {
    try {
      await setDoc(doc(db,'config','hero'), {
        name:      $('h-name').value,
        initials:  $('h-initials').value,
        role:      $('h-role').value,
        headline:  $('h-headline').value,
        bio:       $('h-bio').value,
        objective: $('h-objective').value,
        summary:   $('h-summary').value,
        pill:      $('h-pill').value,
        avatar:    $('h-avatar').value,
        tagline:   $('h-tagline').value,
        email:     $('h-email').value,
        phone:     $('h-phone').value,
        location:  $('h-location').value,
        website:   $('h-website').value,
        resumeUrl: $('h-resumeurl').value,
        education: eduRows,
      });
      await setDoc(doc(db,'config','socials'), { items: socialRows });
      await setDoc(doc(db,'config','stats'),   { items: statRows });
      toast('Hero config saved!');
      refreshPreview();
    } catch(e) { toast('Error: '+e.message,'error'); }
  };

  // Education
  function renderEduRows() {
    $('education-list').innerHTML = eduRows.map((r,i) => `
      <div class="item-row flex items-center gap-2 flex-wrap" id="edu-row-${i}">
        <input class="input-field" style="flex:2;min-width:100px" placeholder="Degree" value="${r.degree||''}" onchange="eduRows[${i}].degree=this.value" />
        <input class="input-field" style="flex:2;min-width:100px" placeholder="School" value="${r.school||''}" onchange="eduRows[${i}].school=this.value" />
        <input class="input-field" style="flex:1;min-width:70px" placeholder="Year" value="${r.year||''}" onchange="eduRows[${i}].year=this.value" />
        <button onclick="eduRows.splice(${i},1);renderEduRows()" class="btn-danger btn-sm"><i class="fa-solid fa-trash"></i></button>
      </div>`).join('');
  }
  window.addEducationRow = () => { eduRows.push({degree:'',school:'',year:''}); renderEduRows(); };
  window.renderEduRows = renderEduRows;

  // Stats
  function renderStatRows() {
    $('stats-list').innerHTML = statRows.map((r,i) => `
      <div class="item-row flex items-center gap-2" id="stat-row-${i}">
        <input class="input-field" style="flex:1" placeholder="Value (e.g. 5+)" value="${r.value||''}" onchange="statRows[${i}].value=this.value" />
        <input class="input-field" style="flex:2" placeholder="Label (e.g. Years Experience)" value="${r.label||''}" onchange="statRows[${i}].label=this.value" />
        <button onclick="statRows.splice(${i},1);renderStatRows()" class="btn-danger btn-sm"><i class="fa-solid fa-trash"></i></button>
      </div>`).join('');
  }
  window.addStatRow   = () => { statRows.push({value:'',label:''}); renderStatRows(); };
  window.renderStatRows = renderStatRows;

  // Socials
  function renderSocialRows() {
    $('socials-list').innerHTML = socialRows.map((r,i) => `
      <div class="item-row flex items-center gap-2 flex-wrap" id="social-row-${i}">
        <input class="input-field" style="flex:2;min-width:100px" placeholder="Label" value="${r.label||''}" onchange="socialRows[${i}].label=this.value" />
        <input class="input-field" style="flex:3;min-width:120px" placeholder="URL" value="${r.url||''}" onchange="socialRows[${i}].url=this.value" />
        <input class="input-field" style="flex:2;min-width:120px" placeholder="FA Icon (fa-brands fa-github)" value="${r.icon||''}" onchange="socialRows[${i}].icon=this.value" />
        <button onclick="socialRows.splice(${i},1);renderSocialRows()" class="btn-danger btn-sm"><i class="fa-solid fa-trash"></i></button>
      </div>`).join('');
  }
  window.addSocialRow  = () => { socialRows.push({label:'',url:'',icon:''}); renderSocialRows(); };
  window.renderSocialRows = renderSocialRows;

  // ─── EXPERIENCE ───────────────────────────────────────────────────────────────
  let expDocs = [];
  async function loadExperience() {
    $('experience-list').innerHTML = '<div class="flex items-center gap-2 text-sm section-label"><div class="loader-ring"></div> Loading...</div>';
    try {
      const snap = await getDocs(query(collection(db,'experience'), orderBy('order','asc')));
      expDocs = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      renderExpList();
    } catch(e) { $('experience-list').innerHTML = `<p class="text-red-400 text-sm">${e.message}</p>`; }
  }

  function renderExpList() {
    if (!expDocs.length) { $('experience-list').innerHTML = '<p class="text-sm section-label">No entries yet.</p>'; return; }
    $('experience-list').innerHTML = expDocs.map((e,i) => `
      <div class="item-row flex items-center justify-between gap-3 fade-in">
        <div class="flex items-center gap-3 min-w-0">
          <i class="${e.icon||'fa-solid fa-briefcase'} text-sm" style="color:var(--accent);width:18px;text-align:center"></i>
          <div class="min-w-0">
            <p class="font-semibold text-sm truncate">${e.role}</p>
            <p class="text-xs section-label truncate">${e.org} · ${e.dateRange||''}</p>
          </div>
        </div>
        <div class="flex items-center gap-2 flex-shrink-0">
          <span class="text-xs section-label">#${e.order||i}</span>
          <button onclick="openExpForm('${e.id}')" class="btn-ghost btn-sm"><i class="fa-solid fa-pen"></i></button>
          <button onclick="deleteExp('${e.id}')" class="btn-danger btn-sm"><i class="fa-solid fa-trash"></i></button>
        </div>
      </div>`).join('');
  }

  window.openExpForm = function(id) {
    $('exp-form-wrap').classList.remove('hidden');
    if (!id) {
      $('exp-form-title').textContent = 'Add Experience';
      $('exp-doc-id').value = '';
      ['exp-role','exp-org','exp-date','exp-icon','exp-desc','exp-tags'].forEach(i => $(i).value='');
      $('exp-order').value = expDocs.length + 1;
    } else {
      const e = expDocs.find(x => x.id===id);
      if (!e) return;
      $('exp-form-title').textContent = 'Edit Experience';
      $('exp-doc-id').value = id;
      $('exp-role').value  = e.role||'';
      $('exp-org').value   = e.org||'';
      $('exp-date').value  = e.dateRange||'';
      $('exp-icon').value  = e.icon||'';
      $('exp-desc').value  = e.description||'';
      $('exp-tags').value  = (e.tags||[]).join(', ');
      $('exp-order').value = e.order||1;
    }
    $('exp-form-wrap').scrollIntoView({behavior:'smooth'});
  };
  window.cancelExpForm = () => $('exp-form-wrap').classList.add('hidden');

  window.saveExpEntry = async function() {
    const id = $('exp-doc-id').value;
    const data = {
      role:        $('exp-role').value,
      org:         $('exp-org').value,
      dateRange:   $('exp-date').value,
      icon:        $('exp-icon').value || 'fa-solid fa-briefcase',
      description: $('exp-desc').value,
      tags:        $('exp-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
      order:       parseInt($('exp-order').value)||1,
    };
    try {
      if (id) await updateDoc(doc(db,'experience',id), data);
      else    await addDoc(collection(db,'experience'), data);
      toast(id ? 'Experience updated!' : 'Experience added!');
      $('exp-form-wrap').classList.add('hidden');
      await loadExperience();
      refreshPreview();
    } catch(e) { toast('Error: '+e.message,'error'); }
  };

  window.deleteExp = async function(id) {
    if (!confirm('Delete this experience entry?')) return;
    try {
      await deleteDoc(doc(db,'experience',id));
      toast('Entry deleted.','warning');
      await loadExperience();
      refreshPreview();
    } catch(e) { toast('Error: '+e.message,'error'); }
  };

  // ─── PORTFOLIO ────────────────────────────────────────────────────────────────
  let portDocs = [];
  async function loadPortfolio() {
    $('portfolio-list').innerHTML = '<div class="flex items-center gap-2 text-sm section-label"><div class="loader-ring"></div> Loading...</div>';
    try {
      const snap = await getDocs(query(collection(db,'portfolio'), orderBy('order','asc')));
      portDocs = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      renderPortList();
    } catch(e) { $('portfolio-list').innerHTML = `<p class="text-red-400 text-sm">${e.message}</p>`; }
  }

  function renderPortList() {
    if (!portDocs.length) { $('portfolio-list').innerHTML = '<p class="text-sm section-label">No items yet.</p>'; return; }
    const typeColor = t => ({PPT:'#f97316',Image:'#06b6d4',URL:'#10b981',Site:'#6366f1',PDF:'#ef4444',Video:'#a855f7'})[t]||'#6366f1';
    $('portfolio-list').innerHTML = portDocs.map((p,i) => `
      <div class="item-row flex items-center justify-between gap-3 fade-in">
        <div class="flex items-center gap-3 min-w-0">
          <span style="font-size:.7rem;padding:.2rem .55rem;border-radius:9999px;background:${typeColor(p.type)}22;color:${typeColor(p.type)};font-weight:700;white-space:nowrap">${p.type}</span>
          <div class="min-w-0">
            <p class="font-semibold text-sm truncate">${p.title}</p>
            <p class="text-xs section-label truncate">${p.description||'—'}</p>
          </div>
        </div>
        <div class="flex items-center gap-2 flex-shrink-0">
          <span class="text-xs section-label">#${p.order||i}</span>
          <button onclick="openPortForm('${p.id}')" class="btn-ghost btn-sm"><i class="fa-solid fa-pen"></i></button>
          <button onclick="deletePort('${p.id}')" class="btn-danger btn-sm"><i class="fa-solid fa-trash"></i></button>
        </div>
      </div>`).join('');
  }

  window.openPortForm = function(id) {
    $('port-form-wrap').classList.remove('hidden');
    if (!id) {
      $('port-form-title').textContent = 'Add Portfolio Item';
      $('port-doc-id').value = '';
      ['port-title','port-desc','port-url','port-thumb'].forEach(i => $(i).value='');
      $('port-order').value = portDocs.length + 1;
    } else {
      const p = portDocs.find(x => x.id===id);
      if (!p) return;
      $('port-form-title').textContent = 'Edit Portfolio Item';
      $('port-doc-id').value = id;
      $('port-title').value  = p.title||'';
      $('port-desc').value   = p.description||'';
      $('port-type').value   = p.type||'URL';
      $('port-url').value    = p.url||'';
      $('port-thumb').value  = p.thumbnail||'';
      $('port-order').value  = p.order||1;
    }
    $('port-form-wrap').scrollIntoView({behavior:'smooth'});
  };
  window.cancelPortForm = () => $('port-form-wrap').classList.add('hidden');

  window.savePortEntry = async function() {
    const id = $('port-doc-id').value;
    const data = {
      title:       $('port-title').value,
      description: $('port-desc').value,
      type:        $('port-type').value,
      url:         $('port-url').value,
      thumbnail:   $('port-thumb').value,
      order:       parseInt($('port-order').value)||1,
    };
    try {
      if (id) await updateDoc(doc(db,'portfolio',id), data);
      else    await addDoc(collection(db,'portfolio'), data);
      toast(id ? 'Portfolio updated!' : 'Portfolio item added!');
      $('port-form-wrap').classList.add('hidden');
      await loadPortfolio();
      refreshPreview();
    } catch(e) { toast('Error: '+e.message,'error'); }
  };

  window.deletePort = async function(id) {
    if (!confirm('Delete this portfolio item?')) return;
    try {
      await deleteDoc(doc(db,'portfolio',id));
      toast('Item deleted.','warning');
      await loadPortfolio();
      refreshPreview();
    } catch(e) { toast('Error: '+e.message,'error'); }
  };

  // ─── SKILLS ──────────────────────────────────────────────────────────────────
  let skillDocs = [];
  async function loadSkills() {
    $('skills-list').innerHTML = '<div class="flex items-center gap-2 text-sm section-label"><div class="loader-ring"></div> Loading...</div>';
    try {
      const snap = await getDocs(query(collection(db,'skills'), orderBy('order','asc')));
      skillDocs = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      renderSkillList();
    } catch(e) { $('skills-list').innerHTML = `<p class="text-red-400 text-sm">${e.message}</p>`; }
  }

  function renderSkillList() {
    if (!skillDocs.length) { $('skills-list').innerHTML = '<p class="text-sm section-label">No skills yet.</p>'; return; }
    $('skills-list').innerHTML = skillDocs.map((s,i) => `
      <div class="item-row flex items-center justify-between gap-3 fade-in">
        <div class="flex items-center gap-3 min-w-0">
          <div style="width:30px;height:30px;border-radius:.4rem;background:${s.color||'#6366f1'};display:flex;align-items:center;justify-content:center;color:#fff;font-size:.8rem;flex-shrink:0">
            <i class="${s.icon||'fa-solid fa-star'}"></i>
          </div>
          <div class="min-w-0">
            <p class="font-semibold text-sm truncate">${s.name}</p>
            <p class="text-xs section-label">${s.category||''} · ${s.level||''}</p>
          </div>
        </div>
        <div class="flex items-center gap-2 flex-shrink-0">
          <span class="text-xs section-label">#${s.order||i}</span>
          <button onclick="openSkillForm('${s.id}')" class="btn-ghost btn-sm"><i class="fa-solid fa-pen"></i></button>
          <button onclick="deleteSkill('${s.id}')" class="btn-danger btn-sm"><i class="fa-solid fa-trash"></i></button>
        </div>
      </div>`).join('');

  window.openSkillForm = function(id) {
    $('skill-form-wrap').classList.remove('hidden');
    if (!id) {
      $('skill-form-title').textContent = 'Add Skill';
      $('skill-doc-id').value = '';
      ['skill-name','skill-cat','skill-icon','skill-level'].forEach(i => $(i).value='');
      $('skill-color').value = '#6366f1';
      $('skill-order').value = skillDocs.length + 1;
    } else {
      const s = skillDocs.find(x => x.id===id);
      if (!s) return;
      $('skill-form-title').textContent = 'Edit Skill';
      $('skill-doc-id').value  = id;
      $('skill-name').value    = s.name||'';
      $('skill-cat').value     = s.category||'';
      $('skill-icon').value    = s.icon||'';
      $('skill-color').value   = s.color||'#6366f1';
      $('skill-level').value   = s.level||'';
      $('skill-order').value   = s.order||1;
    }
    $('skill-form-wrap').scrollIntoView({behavior:'smooth'});
  };
  window.cancelSkillForm = () => $('skill-form-wrap').classList.add('hidden');

  window.saveSkillEntry = async function() {
    const id = $('skill-doc-id').value;
    const data = {
      name:     $('skill-name').value,
      category: $('skill-cat').value,
      icon:     $('skill-icon').value || 'fa-solid fa-star',
      color:    $('skill-color').value,
      level:    $('skill-level').value,
      order:    parseInt($('skill-order').value)||1,
    };
    try {

  async function loadLayout() {
    try {

      if (snap.exists() && snap.data().sections) {

        $('layout-lastupdated').value = snap.data().lastUpdated||'';
      }
      renderLayoutList();
    } catch(e) { console.error(e); renderLayoutList(); }
  }

        <div class="flex items-center gap-3 min-w-0 flex-1">
          <span class="drag-handle text-lg"><i class="fa-solid fa-grip-vertical"></i></span>
          <div class="w-7 h-7 rounded flex items-center justify-center" style="background:var(--accent-glow)">
            <i class="${s.icon}" style="color:var(--accent);font-size:.75rem"></i>
          </div>
          <p class="font-medium text-sm">${s.label}</p>
        </div>
        <div class="flex items-center gap-3 flex-shrink-0">
          <div>
            <label class="form-label text-xs" style="margin-bottom:2px">BG</label>
            <select onchange="layoutSections[${i}].bg=this.value" class="input-field text-xs py-1" style="width:90px;padding:.25rem .5rem">

              <option value="alt"     ${s.bg==='alt'    ?'selected':''}>Alt Neutral</option>
              <option value="accent"  ${s.bg==='accent' ?'selected':''}>Accent Grad</option>

          </div>
          <div class="text-center">
            <label class="form-label text-xs" style="margin-bottom:4px">Visible</label>
            <button class="visibility-toggle ${s.visible!==false?'on':'off'}" onclick="toggleSection(${i})" title="Toggle visibility"></button>
          </div>
          <div class="flex flex-col gap-1">
            <button class="reorder-btn" onclick="moveSectionUp(${i})" ${i===0?'disabled':''}><i class="fa-solid fa-chevron-up"></i></button>
            <button class="reorder-btn" onclick="moveSectionDown(${i})" ${i===layoutSections.length-1?'disabled':''}><i class="fa-solid fa-chevron-down"></i></button>
          </div>
        </div>
      </div>`).join('');
  }

  window.toggleSection = function(i) {
    layoutSections[i].visible = layoutSections[i].visible === false ? true : false;

      $('messages-list').innerHTML = snap.docs.map(d => {
        const m = d.data();
        const ts = m.timestamp?.toDate ? m.timestamp.toDate().toLocaleString() : 'Unknown time';
        return `
          <div class="card-bg p-4 fade-in">
            <div class="flex items-start justify-between gap-3 mb-2">
              <div>
                <p class="font-bold text-sm">${m.name||'Unknown'}</p>

            <p class="text-sm leading-relaxed">${m.message||''}</p>
          </div>`;
      }).join('');
    } catch(e) { $('messages-list').innerHTML = `<p class="text-red-400 text-sm">${e.message}</p>`; }
  };
