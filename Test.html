<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlyonUI Web App Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/flyonui/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-base-200 h-screen flex flex-col font-sans overflow-hidden">

    <header class="navbar bg-base-100 shadow-sm justify-between px-4 border-b border-base-300 z-10">
        <div class="flex items-center gap-4">
            <a class="text-xl font-bold text-primary flex items-center gap-2">
                <i class="fa-solid fa-wand-magic-sparkles"></i> FlyonBuilder
            </a>
            <div class="tabs tabs-box bg-base-200 p-1 size-sm">
                <button id="tab-web-creation" class="tab tab-active text-sm" onclick="switchMainTab('web')">Web Creation</button>
                <button id="tab-comp-creation" class="tab text-sm" onclick="switchMainTab('component')">Component Creation</button>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <button class="btn btn-outline btn-sm btn-secondary" onclick="saveComponent()">
                <i class="fa-solid fa-floppy-disk"></i> Save Component
            </button>
            <button class="btn btn-primary btn-sm" onclick="exportToHTML()">
                <i class="fa-solid fa-download"></i> Export HTML
            </button>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-4 overflow-hidden">

        <aside class="col-span-1 bg-base-100 border-r border-base-300 flex flex-col overflow-y-auto p-4 gap-4">
            <div class="flex flex-col">
                <h2 class="text-sm font-semibold text-base-content/60 uppercase tracking-wider mb-2">FlyonUI Components</h2>
                <input type="text" placeholder="Search components..." class="input input-sm input-bordered w-full mb-4" />
                
                <div class="accordion seq-accordion-boxed">
                    <div class="accordion-item active">
                        <button class="accordion-toggle text-sm font-medium">Buttons & Badges</button>
                        <div class="accordion-content hidden p-2 flex flex-col gap-2">
                            <button class="btn btn-text btn-sm justify-start w-full" onclick="addComponent('btn-primary')">Primary Button</button>
                            <button class="btn btn-text btn-sm justify-start w-full" onclick="addComponent('badge-outline')">Outline Badge</button>
                        </div>
                    </div>
                    <div class="accordion-item">
                        <button class="accordion-toggle text-sm font-medium">Layout & Navigation</button>
                        <div class="accordion-content hidden p-2 flex flex-col gap-2">
                            <button class="btn btn-text btn-sm justify-start w-full" onclick="addComponent('navbar-basic')">Basic Navbar</button>
                            <button class="btn btn-text btn-sm justify-start w-full" onclick="addComponent('footer-simple')">Simple Footer</button>
                        </div>
                    </div>
                    <div class="accordion-item">
                        <button class="accordion-toggle text-sm font-medium">Data Display</button>
                        <div class="accordion-content hidden p-2 flex flex-col gap-2">
                            <button class="btn btn-text btn-sm justify-start w-full" onclick="addComponent('card-basic')">Basic Card</button>
                            <button class="btn btn-text btn-sm justify-start w-full" onclick="addComponent('alert-success')">Success Alert</button>
                        </div>
                    </div>
                    <div class="accordion-item">
                        <button class="accordion-toggle text-sm font-medium text-secondary">❤️ My Saved Components</button>
                        <div id="saved-components-pool" class="accordion-content hidden p-2 flex flex-col gap-2">
                            <p class="text-xs text-base-content/50 italic p-2">No custom components saved yet.</p>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <section class="col-span-3 flex flex-col h-full bg-base-200">
            
            <div class="h-[60%] p-4 flex flex-col">
                <div class="flex items-center justify-between bg-base-100 px-4 py-2 border border-base-300 border-b-0 rounded-t-lg text-xs font-mono text-base-content/70">
                    <span><i class="fa-solid fa-desktop mr-2"></i> Live Canvas Preview</span>
                    <button class="btn btn-text btn-xs text-error" onclick="clearCanvas()">Clear Canvas</button>
                </div>
                <div class="flex-1 bg-white border border-base-300 rounded-b-lg shadow-inner overflow-hidden">
                    <iframe id="live-preview" class="w-full h-full border-0 bg-white"></iframe>
                </div>
            </div>

            <div class="h-[40%] border-t border-base-300 bg-base-100 flex flex-col overflow-hidden">
                <div class="bg-base-200 p-2 flex gap-4 items-center border-b border-base-300 px-4">
                    <span class="text-xs font-bold text-base-content/70 uppercase">Active Node Configuration:</span>
                    <div class="flex items-center gap-2">
                        <label class="text-xs font-mono">ID:</label>
                        <input id="node-id" type="text" placeholder="custom-id" class="input input-xs input-bordered w-32" oninput="updateActiveElementProperties()">
                    </div>
                    <div class="flex items-center gap-2 class-input-wrapper">
                        <label class="text-xs font-mono">Extra Classes:</label>
                        <input id="node-class" type="text" placeholder="mt-4 p-2 shadow" class="input input-xs input-bordered w-64" oninput="updateActiveElementProperties()">
                    </div>
                </div>

                <div class="tabs tabs-bordered bg-base-100 border-b border-base-300">
                    <button id="tab-html" class="tab tab-active font-mono text-xs" onclick="switchEditorTab('html')">HTML</button>
                    <button id="tab-css" class="tab font-mono text-xs" onclick="switchEditorTab('css')">CSS</button>
                    <button id="tab-js" class="tab font-mono text-xs" onclick="switchEditorTab('js')">JS</button>
                </div>

                <div class="flex-1 relative overflow-hidden">
                    <textarea id="editor-html" class="w-full h-full font-mono text-sm p-4 bg-neutral text-neutral-content focus:outline-none resize-none" placeholder="" oninput="syncCodeToPreview()"></textarea>
                    <textarea id="editor-css" class="w-full h-full font-mono text-sm p-4 bg-neutral text-neutral-content focus:outline-none resize-none hidden" placeholder="/* Custom CSS Scope */" oninput="syncCodeToPreview()"></textarea>
                    <textarea id="editor-js" class="w-full h-full font-mono text-sm p-4 bg-neutral text-neutral-content focus:outline-none resize-none hidden" placeholder="// Custom JavaScript Code \n// Use document.querySelector inside handlers" oninput="syncCodeToPreview()"></textarea>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Preset FlyonUI Raw HTML templates
        const componentTemplates = {
            'btn-primary': `<button class="btn btn-primary">Primary Action</button>`,
            'badge-outline': `<span class="badge badge-outline badge-secondary">New feature</span>`,
            'navbar-basic': `<div class="navbar bg-base-100 shadow-md rounded-box w-full mb-4">
  <div class="navbar-start"><a class="btn btn-text text-xl">FlyonUI Site</a></div>
  <div class="navbar-end"><button class="btn btn-primary btn-sm">Get Started</button></div>
</div>`,
            'footer-simple': `<footer class="footer footer-center p-4 bg-base-300 text-base-content rounded mt-8">
  <div><p>Copyright © 2026 - All rights reserved by FlyonBuilder</p></div>
</footer>`,
            'card-basic': `<div class="card bg-base-100 shadow-xl max-w-sm border border-base-200">
  <div class="card-body">
    <h2 class="card-title">FlyonUI Cards!</h2>
    <p>Using utility classes with rich pre-designed structural primitives makes prototyping fun.</p>
    <div class="card-actions justify-end"><button class="btn btn-secondary btn-sm">Buy Now</button></div>
  </div>
</div>`,
            'alert-success': `<div class="alert alert-success shadow-lg mb-4">
  <div><i class="fa-solid fa-circle-check mr-2"></i><span>Your component configurations have been saved locally.</span></div>
</div>`
        };

        let currentMode = 'web'; // 'web' or 'component'
        let savedComponents = JSON.parse(localStorage.getItem('flyon_saved_components')) || {};

        // Base document structure inside the iframe canvas
        function getIframeBaseTemplate(htmlContent = '', cssContent = '', jsContent = '') {
            return `
                <!DOCTYPE html>
                <html lang="en" data-theme="light">
                <head>
                    <link href="https://cdn.jsdelivr.net/npm/flyonui/dist/full.min.css" rel="stylesheet" type="text/css" />
                    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"><\/script>
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
                    <style>
                        body { padding: 1.5rem; background-color: #f8fafc; min-height: 100vh; }
                        ${cssContent}
                    </style>
                </head>
                <body>
                    <div id="canvas-wrapper" class="flex flex-col gap-4 items-start">
                        ${htmlContent}
                    </div>
                    <script>
                        try {
                            ${jsContent}
                        } catch(err) { console.error("Runtime Custom Script Error:", err); }
                    <\/script>
                </body>
                </html>
            `;
        }

        // Initialize App
        window.addEventListener('DOMContentLoaded', () => {
            initAccordions();
            loadSavedComponentsPool();
            clearCanvas();
        });

        // Simple FlyonUI-like Accordion Handler Toggle
        function initAccordions() {
            document.querySelectorAll('.accordion-toggle').forEach(btn => {
                btn.addEventListener('click', () => {
                    const content = btn.nextElementSibling;
                    const item = btn.parentElement;
                    const isOpen = !content.classList.contains('hidden');
                    
                    // Close all
                    btn.closest('.accordion').querySelectorAll('.accordion-content').forEach(c => c.classList.add('hidden'));
                    btn.closest('.accordion').querySelectorAll('.accordion-item').forEach(i => i.classList.remove('active'));

                    if (!isOpen) {
                        content.classList.remove('hidden');
                        item.classList.add('active');
                    }
                });
            });
        }

        // Switch application modes
        function switchMainTab(mode) {
            currentMode = mode;
            document.getElementById('tab-web-creation').classList.toggle('tab-active', mode === 'web');
            document.getElementById('tab-comp-creation').classList.toggle('tab-active', mode === 'component');
            clearCanvas();
        }

        // Switch local view tabs for code editors
        function switchEditorTab(tab) {
            ['html', 'css', 'js'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.toggle('tab-active', t === tab);
                document.getElementById(`editor-${t}`).classList.add('hidden');
            });
            document.getElementById(`editor-${tab}`).classList.remove('hidden');
        }

        // Add a component target structural template to raw inputs
        function addComponent(key) {
            let template = '';
            if (componentTemplates[key]) {
                template = componentTemplates[key];
            } else if (savedComponents[key]) {
                template = savedComponents[key].html;
                if(savedComponents[key].css) {
                    document.getElementById('editor-css').value += "\n" + savedComponents[key].css;
                }
                if(savedComponents[key].js) {
                    document.getElementById('editor-js').value += "\n" + savedComponents[key].js;
                }
            }

            const htmlEditor = document.getElementById('editor-html');
            if (currentMode === 'web') {
                // Append mode for web layout assembly
                htmlEditor.value += (htmlEditor.value ? "\n" : "") + template;
            } else {
                // Replace mode for atomic component composition
                htmlEditor.value = template;
            }
            syncCodeToPreview();
        }

        // Dynamically mirror editors into iframe execution environment
        function syncCodeToPreview() {
            const html = document.getElementById('editor-html').value;
            const css = document.getElementById('editor-css').value;
            const js = document.getElementById('editor-js').value;

            const iframe = document.getElementById('live-preview');
            const targetDoc = iframe.contentDocument || iframe.contentWindow.document;
            
            targetDoc.open();
            targetDoc.write(getIframeBaseTemplate(html, css, js));
            targetDoc.close();
        }

        // Intercept properties inside Active fields and update HTML markup strings
        function updateActiveElementProperties() {
            const idVal = document.getElementById('node-id').value.trim();
            const classVal = document.getElementById('node-class').value.trim();
            const htmlEditor = document.getElementById('editor-html');

            // Parse markup safely using standard DOM parser
            const parser = new DOMParser();
            const doc = parser.parseFromString(`<div>${htmlEditor.value}</div>`, 'text/html');
            const target = doc.querySelector('div').firstElementChild;

            if (target) {
                if (idVal) target.setAttribute('id', idVal);
                else target.removeAttribute('id');

                if (classVal) {
                    // Retain original core flyon functional styling classes, append metadata
                    target.className = classVal;
                }
                htmlEditor.value = doc.querySelector('div').innerHTML;
                syncCodeToPreview();
            }
        }

        // Save local sub-compositions to cache pool
        function saveComponent() {
            const html = document.getElementById('editor-html').value;
            const css = document.getElementById('editor-css').value;
            const js = document.getElementById('editor-js').value;

            if (!html) return alert("Component compilation must contain structural body.");

            const componentName = prompt("Assign unique identifier name for your component:", "my-custom-component");
            if (!componentName) return;

            savedComponents[componentName] = { html, css, js };
            localStorage.setItem('flyon_saved_components', JSON.stringify(savedComponents));
            loadSavedComponentsPool();
        }

        // Sync local storage lists into left runtime context side menus
        function loadSavedComponentsPool() {
            const pool = document.getElementById('saved-components-pool');
            const keys = Object.keys(savedComponents);
            
            if (keys.length === 0) return;
            
            pool.innerHTML = '';
            keys.forEach(k => {
                const btn = document.createElement('button');
                btn.className = "btn btn-text btn-sm text-secondary justify-between w-full font-mono text-xs";
                btn.innerHTML = `<span>📂 ${k}</span> <i class="fa-solid fa-plus text-xs"></i>`;
                btn.onclick = () => addComponent(k);
                pool.appendChild(btn);
            });
        }

        // Flush standard canvas configurations
        function clearCanvas() {
            document.getElementById('editor-html').value = '';
            document.getElementById('editor-css').value = '';
            document.getElementById('editor-js').value = '';
            document.getElementById('node-id').value = '';
            document.getElementById('node-class').value = '';
            syncCodeToPreview();
        }

        // Export complete static distributable HTML files
        function exportToHTML() {
            const html = document.getElementById('editor-html').value;
            const css = document.getElementById('editor-css').value;
            const js = document.getElementById('editor-js').value;

            const finalOutput = getIframeBaseTemplate(html, css, js);
            
            const blob = new Blob([finalOutput], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `flyonui-project-${new Date().toISOString().slice(0,10)}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
